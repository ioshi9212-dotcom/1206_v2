id: east_sector_1206_calendar
name: "Восточный сектор — календарь 1206"
load_mode: calendar_day_phase

current_start:
  date: "1206-08-31"
  day_phase: "поздняя ночь"
  time_of_day: "поздняя ночь"
  scene_id: "start_scene"
  location_id: "jun_house_akira_room"
  location_name: "дом Джуна Картера, комната Акиры"
  active_characters:
    - akira
    - jun
    - irey
    - emma
  conditional_characters:
    - raiden
    - ray
  visible_items:
    - "записка Рэй / Восточный сектор"
    - "документы Акира Агатсуми / 12 апреля"
  akira_state:
    - "резко проснулась"
    - "внешне спокойна и собрана"
    - "память держит только последние два года"
    - "поток, эмоции и память заблокированы изнутри"

calendar_rules:
  - "календарь работает фазами дня, а не точными минутами"
  - "видимая сцена не должна показывать 02:40/03:02/03:23 как жёсткий таймер"
  - "календарь отвечает за даты, окна событий, запреты и обязательные точки"
  - "календарь не даёт NPC знания о будущем"
  - "NPC говорят только то, что знают по своим карточкам"
  - "future_events не использовать как активное знание персонажей"
  - "люди Самуэля не появляются сразу после Райдена; это более позднее предрассветное давление"
  - "Восточный сектор не телепорт: дорога к базе должна иметь физический маршрут и последствия"
  - "мир не ждёт выбора Акиры: активные NPC могут действовать по своим целям во время её пауз, движения и ожидания"
  - "если Акира идёт из точки А в точку Б, она может дойти, задержаться, встретить бытовое препятствие или быть остановлена только по логике локации, календаря и целей присутствующих персонажей"
  - "не создавать препятствие автоматически; если ничто логично не мешает, действие может просто выполниться"
  - "не гарантировать успех выбора игрока; но и не ломать выбор без причины"

scene_resolution_rules:
  movement:
    allowed:
      - "дойти до двери/лестницы/окна/дороги/комнаты, если путь свободен"
      - "потратить время на одежду, обувь, поиск вещей, открывание дверей, спуск по лестнице"
      - "быть задержанной присутствующим NPC, если его цель требует вмешательства"
      - "услышать/заметить бытовую деталь: шаги, скрип, свет, звук машины, телефон, ткань, холодный металл"
    forbidden:
      - "каждый переход превращать в драматическую преграду"
      - "каждый шаг сопровождать водой/воздухом/давлением"
      - "держать всех NPC неподвижными, пока Акира идёт или думает"
  npc_agency:
    - "Джун тянет время, защищает и скрывает правду; не обязан отвечать удобно"
    - "Ирэй ищет шанс сохранить/перехватить Акиру; не обязан быть полностью честным"
    - "Эмма давит и действует по цели; не должна пассивно ждать"
    - "Райден появляется по следу энергии Эммы, если окно сработало, не потому что Акира подумала о нём"
    - "Рэй включается по маршруту Восточного сектора/последствиям, не как мгновенный спасатель"

raiden_dynamic_entry:
  character_id: raiden
  phase_window: "поздняя ночь"
  not_in_first_minutes: true
  cause:
    - "31 августа — день рождения Райдена"
    - "каждый год 31 августа он сидит на обрыве у моря возле Восточного сектора"
    - "дом Джуна не рядом с Восточным сектором, но на мотоцикле добраться недолго"
    - "энергетический отклик Эммы похож на энергию Кайроса"
    - "Райден узнаёт тип угрозы и идёт по следу"
  possible_meeting_locations:
    - "дом Джуна"
    - "двор"
    - "улица возле дома"
    - "гравийная дорога"
    - "трасса"
    - "любая текущая точка, где Акира рядом с Эммой или её следом"
  visible_descriptor_aliases:
    "парень с пирсингом": raiden
  rules:
    - "если в этом окне появился парень с пирсингом, это Райден, а не случайный NPC"
    - "пока Акира не знает имени, в видимой сцене использовать дескриптор парень с пирсингом; character_id остаётся raiden"
    - "не добавлять дополнительные дескрипторы Райдена; мотоцикл — только транспорт/предмет кадра"
    - "после того как имя Райден прозвучало, закрепить имя; не возвращать его в безымянного NPC"
    - "Райден не удивляется самому факту энергии; для него энергия — рабочая реальность"
    - "он может оценить тип, контроль, направление, дистанцию и угрозу"
    - "он не приехал за Акирой и не знает её"

samuel_people_dynamic_entry:
  phase_window: "предрассвет"
  character_group_id: samuel_people
  not_shortly_after_raiden: true
  condition:
    - "Акира долго не дошла до Восточного сектора"
    - "Акира остаётся в доме Джуна, на улице, дороге или другой точке вне Восточного сектора"
  cause:
    - "они идут по следу, как Ирэй"
    - "ищут наличие или остаточный намёк на Акиру"
  possible_entry_points:
    - "дом Джуна"
    - "двор"
    - "улица/дорога"
    - "место, где остался след"
  forbidden:
    - "не приходят через пять минут после Райдена"
    - "не входят на территорию Восточного сектора"
    - "не раскрывают Самуэля прямым текстом без повода"

style_rules:
  - "меньше литературной воды"
  - "воздух/вода/глубина/давление только если это реальный триггер энергии, погоды, моря или тела"
  - "в обычных сценах писать через конкретику: предмет, дверь, шаг, руки, пол, свет, расстояние"
  - "не делать каждую сцену энергетическим omen"
  - "держать календарную цель дня в фокусе"

date_windows:
  "1206-08-31":
    use_file: "calendar/days/1206-08-31.yaml"
    day_context: "стартовая ночь у Джуна и попытка вывести Акиру из-под угрозы"
  "1206-09-01":
    events:
      - id: miki_first_entry
        type: "required_character_entry"
        character: "miki"
        summary:
          - "Мики приходит к Акире"
          - "приносит одежду и/или еду"

east_sector_background:
  year_1201:
    - "после разбирательств Джуна сняли/вынудили уйти в отставку"
    - "Восточный сектор на время фактически распустили"
    - "старые рейдеры ушли в другие подразделения"
  year_1206:
    - "Рэй собирал состав Восточного сектора почти с нуля"
    - "основные рейдеры молодые, примерно до 35 лет"
    - "многие пришли после Академии"
  akira_rule:
    - "Акира НЕ служила в Восточном секторе"
    - "Акира служила в Северном подразделении под Самуэлем"
    - "в детстве могла приходить к Джуну, но нынешний состав этого не знает"
  samuel_rule:
    - "имя Самуэль не запрещено как публичная фигура"
    - "запрещено раскрывать, что именно он ищет Акиру/она ему нужна/он причина её срыва"
