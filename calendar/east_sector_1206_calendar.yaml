id: east_sector_1206_calendar
name: Восточный сектор — календарь 1206
load_mode: calendar
current_start:
  date: "1206-08-31"
  time: "02:40"
  time_of_day: ночь
  scene_id: start_scene
  location_id: jun_house_akira_room
  location_name: дом Джуна Картера, комната Акиры
  active_characters:
    - akira
    - jun_carter
    - irey
    - emma
  conditional_characters:
    - raiden_sterling
  visible_items:
    - записка "Рэй / Восточный сектор"
  akira_state:
    - резко проснулась
    - тело напряжено
    - память держит только последние два года
    - поток, эмоции и память заблокированы изнутри

calendar_rules:
  - календарь отвечает за даты, окна событий, запреты и обязательные точки
  - календарь не даёт NPC знания о будущем
  - NPC говорят только то, что знают по своим карточкам и knowledge
  - future_events не использовать как активное знание персонажей
  - обязательные события нельзя пропускать таймскипом
  - условные события происходят только при выполнении условий
  - пустые дни можно заполнять живыми сценами базы, если они не ломают обязательные события
  - Эхо не вводить раньше первого разрешённого события
  - люди Самуэля не появляются раньше своего окна и не появляются, если Акира уже в Восточном секторе
  - Восточный сектор не телепорт: дорога к базе должна иметь физический маршрут и последствия
  - не использовать старые неактуальные имена/алиасы в календаре

date_windows:
  "1206-08-31":
    day_context: стартовая ночь у Джуна и попытка вывести Акиру из-под угрозы
    active_context:
      - дом Джуна
      - записка "Рэй / Восточный сектор"
      - Ирэй и Эмма как беловолосые незнакомцы для Акиры
      - Джун тянет время и защищает Акиру
      - Райден пока не активен
    events:
      - id: start_scene_0240
        time: "02:40"
        type: required
        location: jun_house_akira_room
        characters:
          - akira
          - jun_carter
          - irey
          - emma
        summary:
          - Акира просыпается ночью
          - слышит голоса снизу
          - видит/фиксирует двух беловолосых незнакомцев
          - находит записку "Рэй / Восточный сектор"
        choices_allowed:
          - слушать
          - спуститься
          - открыть окно и сбежать
          - осмотреть комнату и взять вещи
        forbidden:
          - вводить Эхо
          - вводить Райдена в первом выводе
          - раскрывать имена Ирэя и Эммы до знакомства/источника знания
          - раскрывать беловолосым записку, если они её не видели
          - заставлять Джуна объяснять весь hidden lore

      - id: opening_house_sequence_0240_0302
        time_window: "02:40-03:02"
        type: active_window
        location_scope:
          - комната Акиры
          - второй этаж
          - лестница
          - первый этаж
          - двор
          - дорога, если Акира сбегает
        characters:
          - akira
          - jun_carter
          - irey
          - emma
        allowed:
          - конфликт Джуна, Ирэя и Эммы
          - попытка Акиры слушать, уйти, взять вещи или спуститься
          - защитные действия Джуна
          - уклончивые ответы Джуна
          - давление Эммы
          - микросбой Ирэя при живой встрече с Акирой
          - энергетический импульс Эммы при необходимости сцены
          - выход Акиры к дороге при выборе побега
        forbidden:
          - Эхо
          - случайные люди Самуэля
          - Райден как заранее приехавший за Акирой
          - Восточный сектор как цель Ирэя или Эммы
          - несколько ходов без изменения ситуации

      - id: raiden_motorcycle_arrival_0302
        target_time: "03:02"
        type: conditional_required_window
        character: raiden_sterling
        condition_any:
          - заметный энергетический импульс
          - Эмма использовала энергию так, что появился всплеск
          - конфликт около дома стал активным и слышимым/ощутимым
          - Акира сбежала к дороге или морскому маршруту
        reason:
          - Райден оказывается рядом из-за личного маршрута к морю 31 августа
          - он не едет за Акирой
          - он не знает Акиру при первом появлении
        forbidden:
          - писать, что Райден приехал за Акирой
          - писать, что Райден знает Акиру
          - вводить мотоцикл/голос/силуэт до условия
          - делать появление телепортом без маршрута

      - id: samuel_people_window_0323
        earliest_time: "03:23"
        type: conditional_window
        condition:
          - Акира должна быть вне Восточного сектора
        allowed_locations:
          - дорога
          - дом Джуна
          - зона побега
          - переходная точка до прибытия на базу
        forbidden:
          - вводить людей Самуэля раньше 03:23
          - вводить их, если Акира уже на Восточной базе / в Восточном секторе
          - использовать их как случайную угрозу для рельс

      - id: yuna_possible_0831
        type: conditional_character_entry
        character: yuna
        condition_any:
          - ранение Акиры
          - сильный физический откат
          - потеря сознания
          - состояние, требующее медблока
          - доставка на базу в плохом состоянии
        forbidden:
          - вводить Юну просто как случайную медсестру
          - раскрывать её прошлое с Самуэлем сразу

  "1206-09-01":
    events:
      - id: miki_first_entry
        type: required_character_entry
        character: miki
        summary:
          - Мики приходит к Акире
          - приносит одежду и/или еду
          - база впервые ощущается живой
          - визит Мики не отменяет контроля Рэя

  "1206-09-02_to_1206-09-07":
    events:
      - id: akira_restricted_mode_by_ray
        type: required_state_window
        summary:
          - Акира находится в ограниченном режиме по решению Рэя
          - ей приносят еду
          - её могут навещать Мики или уместные персонажи
          - Рэй сам избегает прямых ответов
          - Рэй не допускает её к кабинету и опасной информации
        not:
          - не полная тюрьма
          - не запрет на помощь Мики
          - не запрет на обычную жизнь внутри разрешённых зон

      - id: kai_shiro_early_presence_window
        type: optional_character_window
        characters:
          - kai
          - shiro
        summary:
          - с 2 по 14 сентября Кай и Широ должны начать попадать в поле зрения Акиры
          - это может быть слух, коридор, столовая, двор, тренировочная зона, наблюдение

      - id: alex_near_miki_common_places
        type: conditional_character_window
        characters:
          - alex
          - miki
        condition:
          - общие места базы
          - Мики рядом или есть контекст Мики
        forbidden:
          - Алекс не приходит как подруга Акиры
          - Алекс не ищет Акиру лично

  "1206-09-05":
    events:
      - id: yuna_deadline_entry
        type: soft_deadline
        summary:
          - Юна должна появиться не позже 5 сентября через медосмотр, допуск или проверку, если не появилась 31 августа
          - не раскрывать её прошлое с Самуэлем сразу

  "1206-09-07":
    events:
      - id: first_talk_with_ray
        type: soft_after_date
        summary:
          - первый полноценный разговор с Рэем становится возможным
          - Рэй говорит дозировано
          - Рэй удерживает контроль над информацией
          - правда не раскрывается целиком
      - id: ray_safety_exam_gate
        type: conditional_access_gate
        condition_any:
          - Акира требует занятия
          - Акира требует лекции
          - Акира требует тренировки
          - Акира прорывается к Рэю
        summary:
          - Рэй может дать технику безопасности и формальный экзамен
          - это инструмент контроля, а не честная открытая дверь
          - после успеха возможны лекции/занятия, но не полноценные тренировки

  "1206-09-12":
    events:
      - id: miki_room_and_raiden_search
        type: soft
        summary:
          - Акира идёт к Мики
          - узнаёт, что парень с пирсингом — Райден
          - пытается найти его, чтобы вернуть косуху

  "1206-09-13":
    events:
      - id: raiden_under_tree
        type: relationship_soft
        summary:
          - Акира находит Райдена под деревом
          - начинается раздражение, странное внимание и первая живая динамика после трассы

  "1206-09-15":
    events:
      - id: seventh_squad_planned_raid
        type: scheduled
        characters:
          - raiden_sterling
          - haru_foster
          - akira
        summary:
          - плановый выезд 7 отряда
          - Акира может оказаться в рейде только через логичную подводку
          - не приказом Рэя "взять её"
      - id: first_raid_echo
        type: required_if_condition
        condition:
          - Акира вне базы/барьера 30+ минут
        summary:
          - первое появление Эхо за много лет
          - до выполнения условия рейд выглядит обычным
          - после появления Эхо Рэй резко ограничивает выезды Акиры
        forbidden:
          - Эхо до условия
          - управляемые Эхо
          - объяснение природы Эхо прямо в сцене

  "1206-09-16":
    events:
      - id: after_first_raid_restrictions
        type: required_followup
        summary:
          - Рэй вызывает Акиру и Райдена
          - не объясняет всё
          - запрещает любые выезды Акиры без личного разрешения
      - id: base_movement_clarification
        type: movement_rule
        summary:
          - запрет касается внешних выездов, рейдов и опасных зон
          - не означает полную изоляцию в комнате
          - Акира может перемещаться по разрешённым зонам базы

  "1206-09-20_to_1206-10-20":
    events:
      - id: base_life_and_social_growth
        type: flexible_window
        summary:
          - клубника, столовая, Мики, бытовые сцены, первые маленькие привязанности
          - Хару возвращается 21 сентября
          - социальный круг расширяется
          - тренировки, тело, стрельба, давление Кая, Алекс/Мики, первые намёки Ирэя
      - id: haru_returns_0921
        date: "1206-09-21"
        type: soft_return
        summary:
          - Хару возвращается с отпуска
          - не знает о потере памяти Акиры
          - уже считал её погибшей
          - реакция сложная, не дешёвое "ты жива?"
      - id: irey_first_shadow_1018
        date: "1206-10-18"
        type: optional_hint
        summary:
          - первый след Ирэя может быть слухом, документом, чужим именем, тихим присутствием или взглядом

  "1206-10-25_to_1206-11-15":
    events:
      - id: pre_second_raid_lecture
        date: "1206-10-25"
        type: soft
        summary:
          - Райден говорит о будущем рейде/маршруте
          - между ним и Акирой уже есть привычное спорное напряжение
      - id: pre_second_raid_rooftop_question
        date: "1206-11-01"
        type: soft
        summary:
          - Акира спрашивает Райдена, женат ли он
          - Райден резко уходит от ответа
          - подводка к скрытой линии кольца/помолвки
      - id: second_raid_city_and_house
        date: "1206-11-03"
        type: fixed
        summary:
          - второй рейд
          - город и дом Акиры
          - дом слишком чистый, пустой и неправильный
      - id: samuel_pressure_hint
        date: "1206-11-10"
        type: optional
        summary:
          - Самуэль может появиться через слухи, документы, распоряжение, беловолосых сопровождающих или реакцию Рэя
      - id: irey_entry_or_stronger_hint
        date: "1206-11-12"
        type: optional
        summary:
          - Ирэй может появиться как внешний фактор не из Восточного сектора
          - вход должен сделать сюжет тревожнее, но не раскрывать сразу цель
      - id: third_raid_echo_contact
        date: "1206-11-15"
        type: fixed
        summary:
          - третий рейд
          - контакт с Эхо
          - первый реальный выстрел
          - город после боя кажется вырезанным из реальности
