scene_specific_npc_rules:
  jun_house:
    random_npcs_allowed: false
    rule: "Дом Джуна — закрытая стартовая сцена. Не добавлять случайных NPC, соседей, прохожих, охрану, людей Самуэля или фоновых персонажей без отдельного условия текущего файла дня."
    allowed_only:
      - akira
      - jun
      - irey
      - emma
      - raiden_if_condition_met
  road_or_route:
    random_npcs_allowed: limited
    rule: "На дороге/маршруте можно использовать только краткий фон среды, если он не создаёт новую угрозу, не ворует сцену и не заменяет активных персонажей."
  east_base:
    random_npcs_allowed: true
    allowed_background_types:
      - рейдеры
      - дежурные
      - медперсонал
      - сотрудники сектора
    rule: "На Восточной базе фоновые персонажи допустимы как среда, но не заменяют Рэя, Юну или других активных персонажей и не забирают сцену."
scene_goal_rule:
  - "Цель персонажа на дату — это намерение персонажа, не гарантированный исход."
  - "Игрок, действия других персонажей, состояние сцены и последствия могут изменить цель, сорвать её или привести к другому пути."
  - "Не вводить новые угрозы и случайных NPC только чтобы насильно вернуть сцену к плану."
