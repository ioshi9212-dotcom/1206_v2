          - "Эмма или другой кайросский или энергетический след достаточно заметен"
          - "Райден логично идёт от морского маршрута или смотровой точки к источнику следа"
        reason:
          - "31 августа день рождения Райдена"
          - "он едет к морю из-за матери"
          - "он чувствует след Эммы"
