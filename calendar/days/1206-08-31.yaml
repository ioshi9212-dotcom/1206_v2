      scene_goal: "выиграть время и направить Акиру к Рэю / Восточному сектору"

    irey:
      character_id: "irey"
      load_when: "active_at_start"
      files:
        main: "characters/irey/main.yaml"
        character: "characters/irey/character.yaml"
        knowledge: "characters/irey/knowledge.yaml"
