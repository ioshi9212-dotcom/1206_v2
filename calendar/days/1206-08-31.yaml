scene_general_info:
  summary: >
    Старт 1206 v2. Акира просыпается ночью в доме Джуна после двух лет жизни
    с неполной памятью. Внизу Джун разговаривает с двумя беловолосыми
    незнакомцами: Ирэем и Эммой. Для Акиры они пока не должны называться по именам,
    если имена не прозвучали или не появились из источника.
  atmosphere:
    - ночь
    - дом кажется знакомым, но не безопасным
    - внизу чужие голоса
    - тело Акиры собрано раньше сознания
    - память держит только последние два года и мелкие улики
  current_pressure:
    - Джун тянет время и пытается защитить Акиру
    - Ирэй и Эмма пришли по следу Акиры
    - Эмма думает, что действует в линии Самуэля
    - Ирэй скрывает от Эммы личную цель
    - Акира знает предупреждение Джуна: если придут чужие — беги и найди Рэя
  what_should_happen_today:
    - дать игроку фактическую ситуацию: ночь, дом, голоса, записка, опасность
    - не раскрывать hidden lore
    - дать Акире реальный выбор: слушать, спуститься, собрать вещи, уйти через окно, искать маршрут к Восточному сектору
    - если сработают условия, открыть окно появления Райдена около 03:02
    - если Акира останется вне Восточного сектора, открыть окно людей Самуэля не раньше 03:23
  what_can_happen_if_player_changes_route:
    - Акира может выйти из дома раньше, чем разговор внизу закончится
    - Ирэй может увидеть живую Акиру и дать микросбой
    - Эмма может применить воду/давление при конфликте
    - Джун может быть ранен Эммой, если сцена дойдёт до прямого давления
    - Райден может появиться только по условию, не как человек, приехавший за Акирой

