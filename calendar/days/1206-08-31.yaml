scene_rules:
- 'Стартовая локация: дом Джуна, комната Акиры.'
- После смены места шапка сцены берёт current_location_id/current_location_text из state, не прибивает всё к дому.
- NPC не знают будущие календарные события.
- Перед репликой NPC проверять его knows_now/must_not_know и knowledge-файл.
- Имена Ирэя и Эммы не писать в POV Акиры до источника знания.
- Записка 'Рэй / Восточный сектор' — план Джуна для Акиры, не цель Ирэя/Эммы.
- Восточный сектор не цель Ирэя, не цель Эммы и не 'дом кайросов'.
- Календарь задаёт рамки, но не играет за Акиру.
time_flow:
  start_time: 02:40
  time_source: state/current_state.json
  rules:
  - Один ход не равен одной минуте.
  - Время = смысловая длительность действий, диалога, пауз, перемещения и ожидания.
  - Если персонажи успели поговорить, сменить позицию, услышать несколько реплик, взять записку, открыть окно или выйти —
    прошло несколько минут.
  - Если время приблизилось к 02:58–03:02, следующий ход должен резко двигать сцену к условию Райдена, а не добавлять новый
    круг пустого разговора.
  - После игровой сцены сохранить current_state.time и last_time_advance_min через applyTurnResult.
  typical_delta_minutes:
    one_glance_or_single_reaction: 0-1
    listen_at_door: 2-6
    short_tense_exchange: 3-7
    house_conflict: 5-15
    collect_items_and_escape_window: 3-10
    escape_to_road: 5-20
    return_to_house_or_route_shift: 5-20
    travel_to_east_base: 20-90
    medical_check: 10-40
    ray_control_scene: 5-20
beats:
- beat_id: start_0240_first_output
  time: 02:40
  duration_hint_min: 3-8
  location_id: jun_house_akira_room
  location_text: Дом Джуна, комната Акиры
  required: true
  status: active_if_first_turn_not_delivered
  character_ids:
  - akira
  - jun
  - irey
  - emma
  scene_info:
  - Акира резко просыпается.
  - Слышит женский голос и незнакомый мужской голос снизу.
  - Видит/фиксирует Джуна и двух беловолосых.
  - Находит записку 'Рэй / Восточный сектор'.
  - Первый вывод нельзя переписывать, если он ещё не был выдан.
  allowed:
  - слушать
  - спуститься
  - взять записку
  - осмотреть комнату
  - уйти через окно
  forbidden:
  - не вводить Райдена
  - не вводить Эхо
  - не раскрывать имена Ирэя/Эммы
  - не раскрывать hidden lore
- beat_id: opening_house_sequence_0240_0302
  time_window: 02:40-03:02
  duration_hint_min: 5-22
  location_scope:
  - комната Акиры
  - второй этаж
  - лестница
  - первый этаж
  - двор
  - дорога если побег
  required: true
  status: active_window
  character_ids:
  - akira
  - jun
  - irey
  - emma
  scene_info:
  - 'Конфликт должен двигаться: позиция, давление, реакция, шанс побега, энергия, время.'
  - Джун тянет время и защищает Акиру.
  - Эмма давит и может использовать энергию.
  - Ирэй скрывает цель и даёт микросбой при живой встрече с Акирой.
  - Акира выбирает маршрут через действие игрока.
  forbidden:
  - не тянуть несколько ходов пустым наблюдением
  - не вводить случайных NPC
  - не выводить людей Самуэля
  - не делать Райдена слышимым без условия
- beat_id: raiden_0302_motorcycle_window
  time: 03:02
  duration_hint_min: 3-12
  type: conditional_required_window
  required_if_condition: true
  condition_any:
  - emma_energy_impulse_occurred
  - energy_flare_occurred
  - akira_escaped_to_road
  - scene_clock_reached_03_02_and_conflict_active
  character_ids:
  - raiden
  - akira
  - jun
  - irey
  - emma
  scene_info:
  - Райден появляется на мотоцикле или первым реагирует на всплеск/дорогу.
  - 'Причина близости: день рождения, море, потеря матери, близкий маршрут, тревога по всплеску/Джуну.'
  - Он не знает Акиру и не приехал за ней.
  forbidden:
  - не появляться без условия
  - не называть Акиру знакомой
  - не называть её Кирой
  - не раскрывать прошлую связь
  - не телепортироваться без маршрута
- beat_id: samuel_people_0323_window
  earliest_time: 03:23
  type: conditional_window
  required: false
  condition_all:
  - akira_outside_east_sector
  - current_time_gte_03_23
  character_ids:
  - samuel_people
  scene_info:
  - Люди Самуэля могут появиться только если Акира всё ещё вне Восточного сектора.
  - Если Акира уже на базе/в секторе, окно закрыто без появления.
  forbidden:
  - не раньше 03:23
  - не намекать шагами/стуком/голосами заранее
  - не появляться, если Акира уже в Восточном секторе
- beat_id: jun_house_resolution_and_father_fate
  time_window: after_03_02 / before_base_arrival
  type: hard_day_resolution
  required: true
  character_ids:
  - akira
  - jun
  - irey
  - emma
  - raiden
  scene_info:
  - День не должен оставить конфликт в доме без развязки.
  - Если канон идёт по фиксированной ветке, Акира видит смерть или критическое последствие для Джуна после побега/возвращения/развязки.
  - Райден может стать тем, кто выводит Акиру из хаоса к Восточному сектору, но не потому что знает её.
  injury_or_death_rules:
  - Джуна может ранить/убить в стартовой ветке только Эмма через воду/влажность/давление жидкости.
  - Глухой удар, падение предмета или стул не подтверждают ранение.
  - Ирэй не должен быть источником смертельного действия против Джуна.
  - Эхо не может ранить Джуна.
  - Люди Самуэля не могут быть источником до своего окна.
  forbidden:
  - не списывать смерть/ранение Джуна на случайность
  - не делать смерть Джуна эффектом Эхо
  - не делать Райдена виновником
  - не оставлять источник неясным, если факт ранения/смерти зафиксирован
- beat_id: east_sector_arrival_0831
  time_window: after_escape_resolution
  type: required_day_direction
  required: true
  condition: Акира вышла из дома/опасной зоны и не была перехвачена людьми Самуэля
  character_ids:
  - akira
  - raiden
  - ray
  scene_info:
  - Акира должна попасть в Восточный сектор/на Восточную базу после стартовой ночи, если её не перехватили вне сектора.
  - Рэй становится контролирующей фигурой, но не раскрывает всё.
  - Восточная база — не тюрьма, но сразу включает контроль доступа и безопасность.
  forbidden:
  - не делать Рэя исповедником
  - не раскрывать семейную связь сразу
  - не давать Акире полный доступ к тренировкам/кабинету/правде
  - не превращать базу в пустую стерильную крепость
- beat_id: yuna_medical_check_after_base_arrival_0831
  time_window: after_base_arrival
  type: conditional_medical_required
  required_if_condition: true
  condition_any:
  - akira_reaches_base_and_medical_context
  - akira_injured
  - akira_has_physical_rollback
  - akira_lost_consciousness
  - need_check_before_access_to_jun_or_base
  - small_room_near_medblock_scene
  character_ids:
  - akira
  - yuna
  - ray
  scene_info:
  - Юна осматривает Акиру как конкретный медик.
  - Юна видит Акиру живой впервые после периода Самуэля и внутренне сбивается.
  - Юна проверяет состояние, память, дыхание, реакцию тела, признаки истощения и перегруза.
  - Юна не раскрывает работу с Самуэлем и прошлое Акиры.
  forbidden:
  - не заменять Юну безымянной медсестрой
  - не раскрывать потерю ребёнка
  - не раскрывать связь Акиры и Райдена
  - не писать Юну грубой/саркастичной
scene_forbidden:
- Не вводить Эхо 31 августа в доме, дворе, дороге, базе или медблоке.
- Не путать энергию Эммы с Эхо.
- Не использовать рваное пространство, шёпот, мерцание реальности как угрозу до первого рейда.
- Не вводить людей Самуэля раньше 03:23 и без условия, что Акира вне Восточного сектора.
- Не делать людей Самуэля обязательной угрозой, если Акира уже на базе.
- Не раскрывать имена Ирэя и Эммы в POV Акиры до источника знания.
- Не писать 'Эмма, но Акира не знает её имени' или 'Ирэй, но Акира не знает его'.
- Не давать Ирэю и Эмме знание записки без источника.
- Не говорить, что Ирэй/Эмма ведут Акиру в Восточный сектор.
- Не говорить 'домой', 'к своим', 'на материк кайросов', 'через границу' как цель для Акиры.
- Не вводить Райдена до условия и не писать, что он приехал за Акирой.
- Не давать Райдену осознанное знание Акиры, имя 'Кира', кольцо, прошлую связь или амнезию.
- Не делать Джуна пассивным.
- Не ранити/убивать Джуна случайностью, мебелью, Эхо, Райденом, Ирэем или безымянным NPC.
- Не заменять Юну безымянным медиком в медицинском контексте 31 августа.
- Не раскрывать hidden lore авторским монологом.
- Не давать NPC знания, которых нет в карточке, knowledge, state или событии сцены.
- Не двигать время механически на +1 минуту.
- Не оставлять 02:40 после нескольких действий, реплик, пауз, сборов или движения.
- Не делать несколько ходов подряд без изменения ситуации.
