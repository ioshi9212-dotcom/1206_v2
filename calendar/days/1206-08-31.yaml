date: '1206-08-31'
year: 1206
day_month: 31 августа
weekday: среда
time_start: 02:40
label: ночной старт в доме Джуна / побег / путь к Восточному сектору
day_type:
- hard_event
- start_day
- escape_pressure
- east_sector_arrival_day
- no_echo_day
source_priority:
  current_user_canon: highest
  clean_character_cards: high
  old_locks_and_old_repos: source_material_only
  old_conflict_resolution:
  - Если старый lock говорит 03:10 для людей Самуэля, текущий календарь использует 03:23.
  - Если старый файл даёт старую фамилию/алиас Акиры, в календаре использовать только имя Акира.
  - 'Если старый файл делает Райдена знающим Акиру, использовать текущий канон: Райден после стирания не помнит Акиру.'
scene_general_info:
  summary: 31 августа 1206 начинается с ночи в доме Джуна. Акира просыпается, от голоса Ирэя, его имя всплывает в памяти, она слышит внизу Джуна, Ирэя и Эмму, находит записку
    'Рэй / Восточный сектор' и должна получить шанс уйти. День должен привести к побегу/выходу из дома, условному появлению
    Райдена около 03:02, развязке у дома Джуна и попаданию Акиры на Восточную базу. Если возникает медицинский контекст после
    прибытия, Юна должна быть конкретным медиком.
  atmosphere:
  - ночь, влажный воздух, слабый ветер со стороны моря
  - дом знакомый, но уже не безопасный
  - Акира пустая и собранная, тело реагирует раньше памяти
  - Джун пытается выиграть секунды
  - Ирэй и Эмма пришли по следу Акиры
  - угроза человеческая/кайросская, не Эхо
  what_should_happen_today:
  - Первый вывод стартовой сцены, если он ещё не был выдан, должен идти по start_scene без переписывания.
  - Акира должна столкнуться с фактом чужих в доме и запиской 'Рэй / Восточный сектор'.
  - 'Игрок должен получить реальный выбор: слушать, спуститься, искать вещи, уйти через окно, двигаться к Рэю/Восточному сектору.'
  - Джун должен быть активным защитником, а не мебелью.
  - Ирэй должен дать микросбой при виде живой Акиры или её чужого взгляда.
  - Эмма должна давить, торопить и при обострении может использовать воду/влажность/давление.
  - Райден может войти в активную сцену около 03:02
  - День должен вести к Восточному сектору/Восточной базе; при прибытии запускается контроль Рэя и, если есть медконтекст,
    Юна.
  hard_day_outcomes:
  - Акира не должна остаться спокойно жить в доме после прихода Ирэя и Эммы.
  - Побег/выход из дома и движение к Восточному сектору — главное направление дня.
  - 'Если разыгрывается канон фиксированной ветки: Акира сбегает, встречает Райдена на трассе/дороге, возвращается или оказывается
    вовлечена в развязку у дома, видит последствия гибели/критического ранения Джуна и попадает на Восточную базу.'
  - Если Джун погибает или получает критическое ранение, источник не Эхо и не случайность; допустимый источник стартовой ветки
    — Эмма через воду/влажность/давление жидкости.
  - Если Акира попала на базу 31 августа и есть медицинский контекст, Юна должна осмотреть её как именованный медик.
  player_freedom_notes:
  - Календарь задаёт обязательные окна и последствия, но не забирает управление Акирой у игрока.
  - Если игрок идёт нестандартно, сохранять цели дня через логичные последствия, а не через внезапные рельсы.
  - Не вводить новые угрозы только чтобы насильно вернуть сцену к плану.
