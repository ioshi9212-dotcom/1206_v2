      character_id: "akira"
      load_when: "always"
      files:
        main: "characters/akira/main.yaml"
        character: "characters/akira/character.yaml"
        knowledge: "characters/akira/knowledge.yaml"
      past_file:
        path: "characters/akira/past.yaml"
        load_only_if:
          - "сцена касается прошлого"
          - "сцена касается памяти"
          - "сцена касается Самуэля"
          - "сцена касается шрама, кольца, ребёнка, лаборатории, Эхо, срыва или самоблокировки"
      scene_goal: "понять угрозу, использовать записку и выбрать действие"

    jun:
      character_id: "jun"
      load_when: "active_at_start"
      files:
        main: "characters/jun/main.yaml"
        character: "characters/jun/character.yaml"
        knowledge: "characters/jun/knowledge.yaml"
      past_file:
        path: "characters/jun/past.yaml"
