        - "понять, почему Акира цепляет"
        - "распознать угрозу"
        - "вызвать Восточный сектор"
        - "отвезти Акиру в Восточный сектор"
        - "по возможности захватить Ирэя и Эмму с помощью Восточного сектора"
        - "действовать как рейдер и командир"
        - "цепляться за Акиру необъяснимым желанием забрать и защитить"
