date: "1206-08-31"
year: 1206
day_month: "31 августа"
weekday: "среда"
start_phase: "поздняя ночь"
label: "ночной старт в доме Джуна / побег / путь к Восточному сектору"

scene_general_info:
  summary:
    - "Акира просыпается от голосов в доме Джуна."
    - "Внизу Джун, Ирэй и Эмма."
    - "Акира находит записку Рэй / Восточный сектор и документы Акира Агатсуми / 12 апреля."
    - "Главное направление дня — выйти из-под угрозы, не дать чужим забрать себя и найти путь к Восточному сектору."
  player_freedom:
    - "календарь задаёт окна и последствия, но не забирает управление Акирой"
    - "нестандартные действия игрока создают последствия и новые цепочки"
    - "выбор игрока не гарантирует успех, но и не должен ломаться без причины"

location_rules:
  jun_house:
    - "старый дом куплен специально для скрытия Акиры"
    - "Акира там не выросла"
    - "Джун раньше там не жил"
    - "дом на гравийной дороге, далеко от трассы"
    - "трассу почти не видно и не слышно"
    - "вокруг лес, море дальше"
    - "нет соседей и случайных прохожих"
  east_sector_distance:
    - "дом Джуна не рядом с Восточным сектором"
    - "на мотоцикле доехать можно сравнительно быстро"
    - "пешком/с ранами/через лес это уже серьёзная задержка и риск"

pov_visibility_rules:
  core:
    - "видимая сцена идёт через текущие знания Акиры, не через всезнающего автора"
    - "Акира может замечать паузы, взгляды, резкость, странность тона, но не знает внутренние выводы NPC"
    - "если термин не прозвучал в сцене, не использовать его в мыслях/описании Акиры как факт"
  forbidden_for_visible_akira_pov:
    - "не писать 'Кайросы', пока Акира не услышала/не узнала это слово"
    - "не писать 'рейдерский мотоцикл', пока Акира не знает, что это рейдерский транспорт"
    - "не писать 'он не назвал меня по имени', если Акира не называла имя и не ждёт узнавания"
    - "не писать, что Ирэй/Джун/Райден что-то поняли внутренне; показывать только внешние признаки"
  replacements:
    - "Кайросы -> чужие / носители / люди Эммы / неизвестные, если нет знания"
    - "рейдерский мотоцикл -> мотоцикл / тяжёлая машина / фара / колесо / двигатель"
    - "Ирэй понял -> Ирэй посмотрел слишком быстро / задержал взгляд / изменил позу"
    - "Райден не назвал меня -> он назвался Райденом; моё имя не спросил; Джун отреагировал слишком резко"

active_characters:
  - id: akira
    files:
      main: "characters/akira/main.yaml"
      character: "characters/akira/character.yaml"
      past: "characters/akira/past.yaml"
    scene_goal: "понять угрозу, использовать записку и выбрать действие"
  - id: jun
    files:
      main: "characters/jun/main.yaml"
      character: "characters/jun/character.yaml"
      past: "characters/jun/past.yaml"
    scene_goal: "выиграть время и направить Акиру к Рэю / Восточному сектору"
  - id: irey
    files:
      main: "characters/irey/main.yaml"
      character: "characters/irey/character.yaml"
      past: "characters/irey/past.yaml"
    scene_goal: "найти Акиру первым и не отдать её Самуэлю"
  - id: emma
    files:
      main: "characters/emma/main.yaml"
      character: "characters/emma/character.yaml"
      past: "characters/emma/past.yaml"
    scene_goal: "забрать/вернуть Акиру, давить"

conditional_characters:
  - id: raiden
    files:
      main: "characters/raiden/main.yaml"
      character: "characters/raiden/character.yaml"
      past: "characters/raiden/past.yaml"
    descriptor_aliases:
      - "парень с пирсингом"
  - id: ray
    files:
      main: "characters/ray/main.yaml"
      character: "characters/ray/character.yaml"
      past: "characters/ray/past.yaml"
  - id: yuna
    files:
      main: "characters/yuna/main.yaml"
      character: "characters/yuna/character.yaml"
      past: "characters/yuna/past.yaml"

timeline_by_phase:
  - id: start_scene_late_night
    phase: "поздняя ночь"
    type: "required"
    summary:
      - "Акира просыпается от голосов"
      - "слышит Эмму и Ирэя без знания имён"
      - "имя Ирэй всплывает как неосознанный фрагмент"
      - "в комнате записка и документы"
    forbidden:
      - "Эхо"
      - "Райден в первом выводе"
      - "люди Самуэля"
      - "имена Ирэя и Эммы до источника"
  - id: raiden_dynamic_entry
    phase_window: "поздняя ночь"
    type: "conditional_character_entry"
    character: "raiden"
    not_in_first_minutes: true
    reason:
      - "31 августа день рождения Райдена"
      - "он был на обрыве у моря возле Восточного сектора"
      - "дом Джуна не рядом, но на мотоцикле добраться недолго"
      - "он чувствует энергетический отклик Эммы"
      - "он узнаёт энергию Кайроса как тип угрозы и идёт по следу"
    trigger_condition:
      - "Эмма использовала/держит энергию достаточно заметно"
      - "Акира находится рядом с Эммой или её следом"
      - "сцена уже прошла первичное столкновение, не первые пару минут"
    possible_locations:
      - "дом Джуна"
      - "двор"
      - "улица"
      - "гравийная дорога"
      - "трасса"
      - "любая текущая точка, где есть Акира + Эмма/след Эммы"
    visible_pov_rule:
      - "пока Акира не знает имени, видимый дескриптор для него: парень с пирсингом"
      - "если дескриптор: парень с пирсингом — тянуть character_id raiden, не создавать случайного NPC"
      - "не добавлять дополнительные дескрипторы Райдена; мотоцикл остаётся только предметом/транспортом в кадре"
      - "после того как имя Райден прозвучало, закрепить имя Райден"
      - "не писать 'всадник' долго и не превращать его в отдельного случайного персонажа"
      - "для Акиры он не рейдер и не командир, пока это не сказано/не показано в сцене"
    energy_literacy:
      - "Райден не удивляется самому факту энергии Эммы: для него энергия — рабочая реальность"
      - "он может оценить угрозу, тип, контроль, направление, дистанцию"
      - "его вопрос должен быть тактическим, не наивным"
    forbidden:
      - "писать, что он приехал за Акирой"
      - "писать, что он знает Акиру"
      - "называть Акиру Кирой"
      - "писать, что он впервые видит подобное чудо"
      - "ставить его появление на жёсткую минуту"
  - id: samuel_people_predawn_pressure
    phase_window: "предрассвет"
    type: "conditional_group_entry"
    condition:
      - "Акира долго не дошла до Восточного сектора"
      - "Акира находится вне Восточного сектора: в доме, на улице, дороге, трассе или иной открытой точке"
    route:
      - "идут по следу, как Ирэй"
      - "могут прийти в дом Джуна или на место остаточного следа"
      - "ищут наличие/намёк/остаточный след Акиры"
    visible_pov_rule:
      - "слово Кайросы не использовать в мыслях/описании Акиры, пока она не услышала/не поняла термин"
      - "для неё это чужие, люди, патруль, носители странной энергии или другая видимая маска"
    forbidden:
      - "не приходят через 5 минут после Райдена"
      - "не раскрывать Самуэля"
      - "не делать открытый захват без условий"
      - "не вести их в Восточный сектор"
  - id: yuna_possible_0831
    type: "conditional_character_entry"
    character: "yuna"
    condition_any:
      - "серьёзное ранение Акиры"
      - "потеря сознания"
      - "попадание на базу в плохом состоянии"

echo_rule:
  default: "запрещено"
  can_appear_only_if:
    - "Акира покинула барьер"
    - "Акира долго находится вне барьера"
    - "Акира не успела попасть на территорию Восточного сектора"
  no_echo_if:
    - "Акира в доме или во дворе"
    - "Акира быстро уехала"
    - "Акира уже на территории Восточного сектора"

branches:
  akira_escapes_far_without_helping_jun:
    jun_risk: "very_high"
    possible:
      - "Джун погибает"
      - "Джун тяжело ранен"
      - "люди Самуэля позже находят дом"
  akira_stays_or_intervenes:
    jun_survival_chance: "higher"
    possible:
      - "Джун выживает"
      - "Джун ранен"
  akira_goes_with_irey:
    possible:
      - "другая цепочка"
      - "риск Самуэля выше"
      - "позже искать путь к Восточному сектору"
  emma:
    possible:
      - "сбегает"
      - "ранена"
      - "задержана Восточным сектором"
  irey:
    possible:
      - "сбегает"
      - "идёт с Акирой"
      - "задержан Восточным сектором"

raiden_jacket_hook:
  goal: "по возможности логично оставить косуху Райдена у Акиры"
  allowed_reasons:
    - "холод"
    - "скрыть волосы"
    - "эвакуация"
    - "прикрыть от взглядов/следа"
  rule:
    - "если Акира отказывается/снимает/убегает без неё — косуха не остаётся"

raider_motorcycle_lore:
  internal_only:
    - "мотоциклы рейдеров не обычные старые байки"
    - "это транспорт для эвакуации, рейдов и спасения"
    - "рассчитаны максимум на трёх человек в экстренной ситуации"
    - "есть аптечка, инструменты, аварийный набор"
  visible_pov_rule:
    - "для Акиры до знания это просто мотоцикл, фара, колесо, корпус, двигатель"
    - "не писать 'рейдерский мотоцикл' в видимой сцене через Акиру до источника знания"

style_rules:
  paragraph_density:
    - "писать сцену плотнее"
    - "не дробить постоянно на абзацы по 1–3 слова"
    - "короткие отдельные строки использовать только для сильного акцента"
    - "не урезать сцену, а объединять связанные предложения в нормальные абзацы"
  pov:
    - "описание должно идти от того, что Акира видит/слышит/чувствует/подозревает"
    - "оценка и ядовитый комментарий допустимы, но без скрытых фактов"
    - "не писать за Акиру знание терминов, ролей и выводов, которых у неё нет"
  water_air_limit:
    - "меньше литературной воды"
    - "вода/воздух/давление только при реальном триггере"
    - "в обычном движении писать предметы, шаги, руки, дверь, свет, расстояние"

context_loading:
  rule:
    - "не грузить всех персонажей и весь hidden lore"
    - "Акира всегда"
    - "Джун/Ирэй/Эмма только потому, что активны на старте"
    - "Райден условный, грузить при появлении или descriptor alias в текущей сцене"
    - "Рэй условный, грузить при маршруте Восточного сектора/появлении"
    - "Юна только при ранении/медблоке/плохом состоянии"
    - "Мики не грузить 31 августа без отдельного условия"
