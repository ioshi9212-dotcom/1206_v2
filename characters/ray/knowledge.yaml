id: ray
display_name: Рэй
file_type: character_static_knowledge
version: 1206_static_knowledge_from_split_v1
purpose: Неизменяемая/стартовая база знаний персонажа. Динамическая память сцены хранится отдельно в state/character_knowledge/{id}.json.
stable_knows:
- Рэй знает, где Акира была последние два года.
- Рэй знает, что она жила у Джуна.
- Рэй знает, что Акира потеряла/заблокировала память.
- Рэй знает, что Джун держал барьер.
- Рэй знает, что Акира Кайрос/Каэрос.
- Рэй знает, что Райден не помнит Акиру.
- Рэй знает, что Акира и Райден были вместе.
- Рэй знает, что Райден сделал ей предложение.
- Рэй знает, что Акира НЕ служила в Восточном секторе.
- Рэй знает, что Акира служила в Северном подразделении под Самуэлем.
- Рэй знает, что нынешний состав Восточного сектора не должен помнить её как старую рейдерку базы.
stable_does_not_know:
- Рэй не знает всю авторскую правду Самуэля, если сцена или отдельный файл не дал это знание.
- Рэй не знает полный механизм реинкарнационной памяти.
- Рэй не знает всё, что происходило с Акирой в период пропажи.
stable_hides_from:
  Акира:
  - Рэй скрывает от Акиры фамилию Картер.
  - Рэй скрывает от Акиры родство с Джуном.
  - Рэй скрывает от Акиры Райдена.
  - Рэй скрывает от Акиры прошлое.
  рейдеры Восточного сектора:
  - Рэй запрещает рейдерам обсуждать прошлое Акиры.
  - Рэй запрещает рассказывать Акире про Райдена.
  - Рэй ограничивает круг доступа к Акире.
stable_misbeliefs: []
rules:
- Этот файл не обновляется через apply-turn-result.
- Если персонаж узнаёт новое в сцене, писать это в state/character_knowledge/{id}.json.
- Не считать hidden lore знанием персонажа без источника в сцене или записи в его state-файле.
