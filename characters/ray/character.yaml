    - "для персонала это просто 'кружки командира, вернуть'"
  forbidden:
    - "не делать кружки тупым мемом"
    - "не раскрывать происхождение подарков сразу"

weaknesses_v9:
  - "Акира как главная слабость"
  - "контроль как способ не развалиться"
  - "страх потерять Акиру снова"
  - "неумение отпускать то, что считает своей ответственностью"
  - "скрытые чувства, которые он маскирует порядком и приказами"

akira_service_knowledge_v9:
  - "Рэй знает, что Акира НЕ служила в Восточном секторе"
  - "Рэй знает, что Акира служила в Северном подразделении под Самуэлем"
  - "Рэй знает, что нынешний состав Восточного сектора не должен помнить её как старую рейдерку базы"
