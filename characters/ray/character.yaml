  - "пьёт только из своих конкретных кружек"
  - "часть кружек — старые подарки от Акиры, но Акира этого не помнит"
  - "носит кофе, забывает о нём, потом пьёт уже холодный"
  - "хранит коньяк, но почти никогда его не пьёт"
  - "держит бумаги ровно, даже когда раздражён"
  - "проверяет замки, доступы и списки людей чаще, чем нужно"
  - "когда думает об Акире, может машинально тронуть край портмоне/внутренний карман"
  - "заботится приказом, режимом, едой/лекарствами/доступом, а не мягкими словами"

