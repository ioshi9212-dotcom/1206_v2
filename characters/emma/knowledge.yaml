id: emma
display_name: Эмма
file_type: character_static_knowledge
version: 1206_static_knowledge_from_split_v1
purpose: Неизменяемая/стартовая база знаний персонажа. Динамическая память сцены хранится отдельно в state/character_knowledge/{id}.json.
stable_knows:
- Эмма знает, что Акира нужна системе.
- Эмма знает, что след Акиры найден в зоне дома.
- Эмма знает/считает, что Джун скрывал Акиру или связан с её укрытием.
- Эмма знает, что Ирэй реагирует на Акиру слишком лично.
- Эмма и люди, которые придут позже, работают на одну цель.
- 'Цель Эммы и людей той же системы не отличается: Акира должна попасть к скрытому заказчику.'
stable_does_not_know:
- Эмма не знает полную историю Акиры.
- Эмма не знает точный механизм самоблокировки.
- Эмма не знает заранее, почему Акира может не помнить людей.
- Эмма не знает детали отношений Акиры и Райдена.
- Эмма не знает про ребёнка.
- Эмма не знает происхождение шрама на животе.
- Эмма не знает всей личной цели Ирэя.
stable_hides_from:
  Акира:
  - Эмма скрывает прямого хозяина задачи.
  - Эмма не произносит имя Самуэля в сцене.
stable_misbeliefs: []
rules:
- Этот файл не обновляется через apply-turn-result.
- Если персонаж узнаёт новое в сцене, писать это в state/character_knowledge/{id}.json.
- Не считать hidden lore знанием персонажа без источника в сцене или записи в его state-файле.
