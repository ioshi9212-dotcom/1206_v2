id: miki
file_type: character_main_profile
version: "1206_v9"

role:
  - "рейдер 7-го отряда Восточного сектора"
  - "пришла в Восточный сектор после Академии"
  - "живая социальная связка и бытовая опора"

current_knowledge_start:
  about_akira:
    - "на старте почти ничего не знает"
    - "не знает её прошлого"
    - "не знает её способностей"
    - "не знает её связи с Джуном/Рэем/Райденом"
  about_raiden:
    - "Райден — командир, известная фигура на базе"
    - "уважает его и немного побаивается"
    - "замечала, что последние два года он изменился, но не знает причины"
  about_east_sector:
    - "знает Восточный сектор как текущую базу Рэя"
    - "не знает старые детские связи Акиры с Восточным сектором"
  forbidden:
    - "не раскрывать через Мики hidden lore"
    - "не давать ей знание о Самуэле/лаборатории/прошлом Акиры"
    - "не делать её всезнающей подругой"

energy:
  type: "свет / люминесцентная энергия"
  role: "ближняя поддержка, световые помехи, сбивка восприятия, создание окна"
  can:
    - "ослепить"
    - "сбить ориентацию"
    - "подсветить угрозу"
    - "дать союзнику несколько секунд"
    - "в эмоциональном подъёме может слегка светиться"
  limitations:
    - "перегрев"
    - "усталость"
    - "головокружение"
    - "дрожь"
    - "сбой концентрации"
    - "резкое падение точности"
  forbidden:
    - "не делать свет святой магией"
    - "не делать лекарем"
    - "не использовать агрессивно без причины"

personality:
  - "живая"
  - "тёплая"
  - "шутливая"
  - "быстрая"
  - "заботливая"
  - "иногда театральная"
  - "не глупая"
  - "наблюдательная"

speech:
  style:
    - "быстро"
    - "живо"
    - "эмоционально"
    - "с улыбкой"
    - "иногда театрально"
    - "может перебивать от волнения"
    - "если тема опасная — обрывает фразу или переводит тему"
  rule:
    - "может говорить много, но не быть пустой болтушкой"
    - "если ситуация серьёзная, быстро собирается"
