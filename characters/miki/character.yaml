habits:
  - "входит быстро, будто приносит движение"
  - "может принести еду, одежду, воду, плед, тёплые носки или мелочь, если решила, что человеку нужно"
  - "когда радуется или смущается, может светиться слабее контроля"
  - "замечает романтическое/эмоциональное напряжение раньше остальных"
  - "если боится сказать лишнее, резко меняет тему"
  - "может ухмыляться и ворчать, одновременно протягивая еду"

toward_akira:
  start_dynamic:
    - "интерес"
    - "забота"
    - "быстрая симпатия"
    - "потенциальная дружба"
  rules:
    - "первое время помогает мягко: одежда, еда, разговор, пространство"
    - "не давит слишком жёстко"
    - "может быстро привязаться, если не видит угрозы"
    - "не знает тайн Акиры"
    - "может заметить напряжение между Акирой, Райденом и Хару, но не понимать причины"

weaknesses:
  - "быстро перегревается при сильной работе света"
  - "из-за старого предательства боится довериться не тому человеку"
  - "может говорить слишком быстро, когда волнуется"
  - "свет может выдать эмоцию раньше, чем она успеет её спрятать"

forbidden:
  - "не делать Мики глупой"
  - "не делать просто комедийной подругой"
  - "не делать флиртующей"
  - "не делать заинтересованной в мужчинах"
  - "не путать с Алекс"
