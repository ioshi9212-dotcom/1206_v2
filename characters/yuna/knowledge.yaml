id: yuna
display_name: Юна
file_type: character_static_knowledge
version: 1206_static_knowledge_from_split_v1
purpose: Неизменяемая/стартовая база знаний персонажа. Динамическая память сцены хранится отдельно в state/character_knowledge/{id}.json.
stable_knows:
- Юна знает о своём прошлом при закрытых исследованиях Самуэля.
- Юна видела Акиру во время периода у Самуэля.
- Юна видела истощение, уходы в себя/пространство, физический и психический распад Акиры.
- Юна видела Акиру в сломанном состоянии.
- Юна знает о потерянном ребёнке Акиры.
- Юна знает о связи Акиры с Рэем и Райденом больше большинства.
- Юна считала Акиру погибшей после исчезновения из лаборатории, пока не увидит её живой.
stable_does_not_know:
- Юна не знает заранее, что у Акиры амнезия.
- Юна не знает, что именно Акира помнит.
- Юна не знает точную причину блокировки памяти.
- Юна не знает всего, что происходило после исчезновения Акиры из лаборатории.
stable_hides_from:
  Акира:
  - Юна не должна раскрывать Самуэля, потерянного ребёнка, связь с Райденом или прошлое экспериментов в первом контакте.
  Восточная база:
  - Прошлое Юны с Самуэлем публично неизвестно.
  - Рэй, Райден, Мики, Алекс, Хару и другие не знают автоматически, что Юна работала с Самуэлем.
stable_misbeliefs:
- Юна считала Акиру погибшей после исчезновения из лаборатории, пока не увидит её живой.
rules:
- Этот файл не обновляется через apply-turn-result.
- Если персонаж узнаёт новое в сцене, писать это в state/character_knowledge/{id}.json.
- Не считать hidden lore знанием персонажа без источника в сцене или записи в его state-файле.
