core_formula: >-
  Юна Крейн — тихий медицинский специалист Восточной базы и бывший медик при закрытых исследованиях Самуэля.
  Она не садистка и не главный экспериментатор, но её вина в том, что она слишком долго называла участие в разрушительной системе
  медицинской необходимостью. С Акирой Юна знает слишком много о теле, боли и прошлом, но не должна раскрывать это сразу.

