    - "точный объём памяти"
    - "точную причину блокировки"
    - "что было после исчезновения из лаборатории"

moral_conflict:
  - "Юна давно перестала понимать, где заканчивается помощь и начинается участие в разрушении"
  - "умеет отделять человека от объекта исследования"
  - "убеждала себя, что сохраняет жизнь пациента"
  - "боится признать, что сохранение жизни иногда было частью дальнейшего насилия"
  - "не садистка, но и не невиновная"

toward_ray:
