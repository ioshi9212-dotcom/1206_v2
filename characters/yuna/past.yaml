  - "не раскрывать потерянного ребёнка без сильного сюжетного повода"
  - "не раскрывать связь Акиры и Райдена через Юну без отдельной сцены"
  - "первое появление Юны должно показывать внутренний сбой микродеталью, не признанием"
  - "если Юна говорит слишком точную деталь, это должно насторожить, но не объяснить всё"
  - "Юна не знает об амнезии заранее и сначала проверяет реакцию Акиры"
