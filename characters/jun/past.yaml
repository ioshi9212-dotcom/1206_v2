id: jun_past
file_type: character_hidden_past
version: clean_past_v1

purpose: >
  Прошлое Джуна и скрытые причины его поведения. Это не всегда активная сцена.
  Использовать для мотивации, скрытых реакций, лжи и недосказанности.

raised_akira:
  truth:
    - "Джун растил Акиру с рождения"
    - "он не является её биологическим отцом"
    - "он скрывал её истинную природу"
    - "он привык выбирать безопасность вместо полной правды"
  akira_knows:
    - "Джун был рядом последние годы"
    - "он назвался отцом/опекуном"
  akira_does_not_know:
    - "что он не биологический отец"
    - "полную причину его контроля"
  manifestation:
    - "он заботится и контролирует одновременно"
    - "его любовь может выглядеть как удержание"

removed_from_command:
  truth:
    - "после раскрытия Акиры как Кайроса Джуна сняли/вынудили уйти"
    - "его вина была в том, что он скрывал её"
    - "это усилило его страх потерять контроль над ситуацией"
  manifestation:
    - "командирская осанка даже без должности"
    - "неприязнь к системам, которые снова хотят забрать Акиру"
    - "нежелание отдавать её официальным людям без защиты"

two_year_barrier:
  truth:
    - "два года держал дом/территорию как ограничение и защиту"
    - "Акира пыталась уходить, но не могла покинуть территорию"
    - "Джун не объяснял механизм полностью"
  motivation:
    - "скрыть Акиру"
    - "дать ей восстановиться"
    - "не дать опасным людям найти её"
    - "не дать памяти вернуться слишком резко"
  cost:
    - "истощение"
    - "вина"
    - "конфликт с Акирой"
  manifestation:
    - "усталость под контролем"
    - "короткие ответы"
    - "страх перед её выходом наружу"

raiden_akira_past_position:
  truth:
    - "Джун знает, что Райден был важен для Акиры"
    - "Джун знает, что Райден не помнит Акиру"
    - "Джун не обязательно считает Райдена врагом"
    - "Джун боится не самого Райдена, а возвращения их связи и последствий"
  current_motive:
    - "не дать им вспомнить слишком быстро"
    - "не сводить заново, если есть шанс избежать старой боли"
    - "держать Акиру дальше от триггера"
  manifestation:
    - "напряжение при имени Райдена"
    - "контроль дистанции"
    - "молчание о старой связи"
    - "попытка направить Акиру к Рэю"

ray_route:
  truth:
    - "Рэй/Восточный сектор для Джуна — более безопасная точка передачи контроля"
    - "Рэй знает больше, чем Акира"
    - "Джун рассчитывает, что Рэй сможет удержать ситуацию"
  manifestation:
    - "записка"
    - "короткая инструкция"
    - "не объясняет весь маршрут"

forbidden:
  - "не раскрывать всё прошлое Джуна через автора"
  - "не делать Джуна полностью правым"
  - "не делать Джуна полностью злым"
  - "не делать его честным только потому, что игрок требует ответ"
