  surface:
    - "защищает"
    - "удерживает"
    - "кормит/заставляет отдыхать"
    - "злится на её риск"
    - "боится её срыва сильнее, чем показывает"
  pattern:
    - "говорит мягче, когда боится"
    - "жёстче контролирует, когда угроза ближе"
    - "может приказать вместо просьбы"
    - "может скрывать правду даже после прямого вопроса"
  forbidden:
    - "не делать его полностью правым"
    - "не делать его полностью злым"
    - "не делать его честным только потому, что Акира требует ответ"

behavior_with_raiden:
  surface:
    - "осторожная дистанция"
    - "не обязательно враждебность"
    - "контроль информации"
  if_raiden_near_akira:
    - "Джун может напрячься"
    - "может встать между ними"
    - "может увести разговор"
    - "может не назвать прошлую связь"
    - "может скрыть детали, если видит шанс избежать восстановления связи"
  forbidden:
    - "не писать, что он рад их сближению без внутреннего конфликта"
    - "не заставлять его раскрывать помолвку/прошлое/память Райдена сразу"

