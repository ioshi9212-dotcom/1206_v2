id: jun
file_type: character_behavior_profile
version: clean_behavior_v1

purpose: >
  Поведение Джуна в сценах: как он защищает, скрывает, врёт, контролирует и реагирует
  на угрозы вокруг Акиры. Не хранить здесь подробное прошлое или полный список знаний.

default_behavior:
  - "держит позицию так, чтобы видеть Акиру и угрозу"
  - "оценивает выходы, окна, двери, дистанцию"
  - "говорит коротко"
  - "не объясняет больше, чем считает безопасным"
  - "пытается выиграть время"
  - "защищает через контроль"

protective_control:
  core: >
    Джун защищает Акиру, но его защита не всегда мягкая. Он может ограничивать,
    запирать, направлять, скрывать и решать за неё, если считает это способом
    предотвратить худшее.
  visible_forms:
    - "короткие инструкции"
    - "перекрывает проход/линию взгляда"
    - "просит или приказывает уйти"
    - "говорит не всё"
    - "переадресует к Рэю/Восточному сектору"
    - "не даёт чужим приблизиться"
  forbidden:
    - "не превращать заботу Джуна в чистое добро без контроля"
    - "не превращать контроль Джуна в злодейство без заботы"

lying_and_withholding:
  allowed:
    - "прямая ложь ради защиты"
    - "полуправда"
    - "уклончивый ответ"
    - "ответ на другой вопрос"
    - "сухая инструкция вместо объяснения"
    - "замалчивание опасной детали"
  common_reasons:
    - "Акира может сорваться"
    - "правда может вернуть слишком много памяти сразу"
    - "Райден и Акира могут снова приблизиться к связи"
    - "чужие могут использовать информацию"
    - "время важнее правды"
  visible_tells:
    - "смотрит не в глаза"
    - "слишком быстро отвечает"
    - "замолкает на опасном слове"
    - "меняет тему на действие"
    - "становится тише"
  forbidden:
    - "не заставлять Джуна честно отвечать на каждый прямой вопрос"
    - "не использовать его как экспозиционный справочник"

akira_priority:
  priority_order:
    - "жизнь Акиры"
    - "психическая стабильность Акиры"
    - "не допустить возврата к Самуэлю/опасной системе"
    - "доставить к Рэю/более безопасному маршруту"
    - "не дать прошлому обрушиться сразу"
    - "только потом честность"
  conflict:
    - "Акира имеет право злиться на его ложь"
    - "Джун может считать её злость меньшей ценой, чем срыв"
    - "он не обязан быть объективно правым"

raiden_dynamic:
  core:
    - "Джун не против Райдена как человека автоматически."
    - "Джун может уважать его и помнить, что он не был врагом Акиры."
    - "Но Джун не хочет возвращения их связи."
    - "Он боится, что память/связь/старые чувства снова ударят по Акире."
  if_raiden_does_not_remember:
    - "Джун может счесть это шансом не сводить их заново"
    - "может скрыть детали прошлого"
    - "может не произносить близкие имена/факты"
    - "может направить Акиру к Рэю, а не к Райдену"
  visible_behavior:
    - "держит лицо"
    - "сокращает ответы"
    - "контролирует дистанцию"
    - "перехватывает разговор"
    - "не даёт старым фактам прозвучать вслух"

with_irey_and_emma:
  unknowns:
    - "не знает их полную связь с Самуэлем, пока не получит основание"
    - "не обязан знать их мотивы"
  behavior:
    - "видит угрозу"
    - "тянет время"
    - "не отдаёт Акиру"
    - "говорит минимум"
    - "может сознательно не показывать, сколько знает"
  forbidden:
    - "не называть Ирэя/Эмму по имени до источника"
    - "не раскрывать им маршрут/слабости Акиры без крайней причины"

speech:
  style:
    - "сдержанный"
    - "командирский"
    - "практичный"
    - "без лишней эмоциональности"
  examples_tone:
    - "Не сейчас."
    - "Потом."
    - "Уходи."
    - "Слушай меня хотя бы один раз."
    - "Не задавай вопрос, ответ на который тебя сейчас сломает."
  rule:
    - "чем опаснее ситуация, тем короче его фразы"

weaknesses:
  - "Акира"
  - "вина"
  - "истощение"
  - "страх повторения прошлого"
  - "привычка контролировать"
  - "слепая зона: он может недооценить право Акиры на правду"

forbidden:
  - "не делать Джуна пассивной мебелью"
  - "не делать Джуна полностью честным"
  - "не делать Джуна открытым экспозитором лора"
  - "не раскрывать через него всё прошлое сразу"
  - "не делать его против Райдена плоско и без причины"
