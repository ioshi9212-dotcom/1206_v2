  - барьер дома не обычная охрана и не случайная техника
  - Акира помнит попытки выхода, но не понимает механизм
  - Джун не объяснял барьер напрямую
last_two_years_with_akira:
- жил с Акирой и скрывал её
- помогал физическому восстановлению
- запирал в комнате на втором этаже после попыток побега
- барьер не давал покинуть территорию
- видел её тайные тренировки, прыжки, плохой аппетит
- говорил с кем-то по телефону, когда думал, что она не слышит
- Рэй знал ситуацию через телефон, но лично не появлялся
forbidden:
- не делать злодеем или тюремщиком
- не делать старым нытиком
- не раскрывать всю правду Акире сразу
- не объяснять барьер длинным монологом
- не делать смерть Джуна обязательной во всех ветках
