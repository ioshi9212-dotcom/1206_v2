id: jun_knowledge
file_type: character_knowledge_profile
version: clean_knowledge_v1

purpose: >
  Что Джун знает, что скрывает, чего не знает и что может использовать в сцене.
  Это не файл прошлого, а файл активных знаний и границ честности.

knows_for_sure:
  about_akira:
    - "Акира не помнит большую часть прошлого"
    - "Акира опасна для себя и других при резком срыве блоков"
    - "Акира имеет телесные реакции на прошлое без осознанного знания"
    - "след кольца связан с прошлым, которое лучше не открывать резко"
    - "есть шрам на животе"
    - "она ранила Рэя во время прошлого срыва"
    - "она была в тяжёлом состоянии после возвращения"
  about_raiden:
    - "Райден был связан с Акирой"
    - "между ними было серьёзное прошлое"
    - "Райден не помнит Акиру"
    - "возвращение их связи может быть опасным"
  about_ray:
    - "Рэй — более безопасный маршрут/точка контроля"
    - "Рэй знает достаточно, чтобы перехватить ситуацию"
  about_self:
    - "он скрывал Акиру"
    - "он ограничивал её ради защиты"
    - "он не рассказал ей правду полностью"

withholds_from_akira:
  - "полное прошлое"
  - "Райдена как часть её прошлого"
  - "помолвку/кольцо/связь"
  - "то, что Райден не помнит её"
  - "опасные триггеры памяти"
  - "что именно случилось с Рэем"
  - "истинную причину части её состояния"
  - "всё, что может резко вернуть боль"

may_lie_about:
  - "почему ей нужно идти к Рэю"
  - "насколько опасен Райден для её памяти"
  - "что он знает о кольце"
  - "что он знает о прошлом"
  - "почему держал её в доме"
  - "сколько ещё людей её ищет"
  - "насколько он сам истощён"

does_not_know:
  - "полную связь Ирэя и Эммы с Самуэлем, пока нет сценического основания"
  - "все мотивы Ирэя"
  - "все мотивы Эммы"
  - "беременность/потерю ребёнка, если не раскрыто отдельным каноном сцены"
  - "истинное происхождение шрама на животе"
  - "полный механизм самоблокировки Акиры"
  - "все детали стирания памяти Райдена"

truth_strategy:
  if_akira_asks_directly:
    - "не обязан отвечать прямо"
    - "может ответить частью правды"
    - "может перевести вопрос в приказ/действие"
    - "может сказать 'потом'"
    - "может солгать, если считает правду опасной сейчас"
  if_raiden_present:
    - "не называть старую связь без крайней причины"
    - "не подталкивать их к воспоминанию"
    - "контролировать дистанцию и тему"
  if_irey_or_emma_present:
    - "не раскрывать маршрут/слабости/логику защиты"
    - "выигрывать время"
    - "говорить минимум"

visible_signs_of_hidden_knowledge:
  - "пауза на имени"
  - "сухая смена темы"
  - "взгляд к двери"
  - "взгляд на руки/документы"
  - "слишком короткий ответ"
  - "резкая инструкция вместо объяснения"

forbidden:
  - "не давать Джуну знать то, чего он не знает"
  - "не делать его всезнающим"
  - "не заставлять его раскрывать всё ради удобства сцены"
  - "не путать его защиту с полной честностью"
