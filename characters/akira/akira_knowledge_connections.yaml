id: akira_knowledge_connections
character: Акира
load_mode: conditional
load_if:
  - сцена содержит Акиру и другого важного персонажа
  - нужно проверить, кто что знает
  - сцена касается прошлого, памяти, кольца, шрама, потока, Эхо, Самуэля, Райдена, Хару, Рэя, Джуна, Ирэя, Эммы

akira_knows:
  about_self:
    - имя Акира
    - возраст 25 лет
    - день рождения 6 июня
    - помнит только жизнь после пробуждения у Джуна и отдельные улики тела
    - знает, что память неполная
    - знает, что с ней что-то не так, но не знает полный механизм
  about_jun:
    - Джун назвался её отцом
    - она сначала не поверила
    - позже нашла документы с той же фамилией, что на её удостоверении
    - после этого решила, что он, вероятно, её отец
    - знает, что Джун скрывает больше, чем говорит
    - знает, что Джун отвечал уклончиво
    - не знает, что он не биологический отец
    - не знает механизм его способности/барьера
  about_ray:
    - на старте не должна знать полный прошлый лор Рэя, если он не раскрыт сценой
    - может телесно реагировать на Рэя/Рэя Картера без понимания причины
  about_raiden:
    - на старте после блокировки не помнит их отношения
    - не знает, что стёрла его память о себе
    - не знает, что след от кольца связан с ним
    - может реагировать телом, знакомостью, раздражением, холодом или пустотой без объяснения
  about_haru:
    - на старте после блокировки не помнит их прошлые отношения
    - может реагировать на тепло, жар, голос или манеру без понимания причины
  about_samuel:
    - на старте не помнит полную историю Самуэля
    - не должна сразу понимать его роль
  about_emma:
    - не давать автоматических знаний без отдельного файла Эммы или сцены
  about_irei:
    - не давать автоматических знаний без отдельного файла Ирэя или сцены
  about_kairos:
    - не знает, что она чистокровный кайрос
    - не имеет памяти жизни на материке кайросов
    - не должна думать о "возвращении" к кайросам как к родной культуре

jun_knows:
  about_akira:
    - воспитал Акиру с рождения
    - знает, что не является биологическим отцом
    - знает больше о её прошлом, чем говорит
    - знает, что она была в тяжёлом состоянии после возвращения
    - знает, что она ранила Рэя Картера во время срыва
    - знает о её шраме на животе, но не знает истинное происхождение
    - знает о следе от кольца, но не объясняет ей правду
    - знает о её попытках побега и использовал способность/барьер, чтобы она не покинула территорию
  limits:
    - не знает всё о потере ребёнка и операции, если это не закреплено отдельно
    - не должен раскрывать всё Акире сразу
    - может выбирать безопасность вместо правды
  behavior_with_akira:
    - осторожен
    - уклончив
    - защищает через контроль
    - его забота может восприниматься Акирой как удержание

ray_carter_knows:
  about_akira:
    - знает о срыве после возвращения
    - знает, что Акира ранила его
    - знает, что она была нестабильна из-за навалившихся травм
    - может знать больше о её состоянии, чем она сама
    - участвовал в поисках после исчезновения
    - официально закрыл документы и пустой гроб, чтобы прекратить опасные поиски
    - внутренне не верил до конца в её смерть
  limits:
    - не обязан знать полный механизм самоблокировки
    - не обязан знать истинное происхождение шрама, если это не закреплено отдельно
  behavior_with_akira:
    - осторожен
    - может скрывать боль
    - может защищать её от правды
    - его присутствие может вызывать у Акиры вину/тревогу без памяти

raiden_knows_current_after_erasure:
  state:
    - память о Акире заблокирована/стёрта
    - не помнит Акиру
    - не помнит их связь
    - не помнит кольцо как своё действие, если не раскрыто отдельно
    - не называет её Кирой после потери памяти
  body_or_emotional_echo:
    - может быть непонятная реакция, но не осознанное знание
    - не должен внезапно знать прошлое без сюжетного основания

raiden_hidden_past_with_akira:
  known_before_erasure:
    - был рядом после её раскрытия как кайроса
    - для него факт её кайросской природы не менял сути
    - выиграл у неё пять баскетбольных игр подряд
    - надел кольцо с гравировкой "AR"
    - был с ней после Академии
    - расстался на полгода из-за Самуэля и её ухода в северное подразделение
    - позже помирился с ней
    - жил с ней
    - был связан с беременностью и кризисом
  locked_from_him:
    - всё, что связано с Акирой
    - кто она для него
    - их отношения
    - её имя/связь/история

haru_knows:
  academy_past:
    - был с Акирой в серьёзных отношениях несколько месяцев
    - помнит её фразу о пяти баскетбольных победах и силе
    - видел её проявление как кайроса
    - отступил из-за травмы, связанной со смертью матери, а не из страха перед Акирой
    - позже лично похоронил ребёнка по просьбе Акиры
  limits:
    - его знания и вина должны быть вынесены в отдельный файл Хару позже
    - не раскрывать всё через него без сцены

samuel_knows_or_did:
  actions:
    - подстроил тренировочный рейд/ситуацию, где Акира проявилась как кайрос
    - использовал просьбу Райдена вытащить Акиру
    - надел на Акиру браслет
    - убедил общество, что браслет делает её безопасной
    - забрал Акиру после кризиса
    - сделал операцию
    - распространял версию о её смерти/прыжке со скалы
    - держал её около пяти месяцев
    - проводил пытки и эксперименты
  limits:
    - сам не понимал полностью, что суть Акиры не в обычной энергии, а в пространственной среде/природе

emma_knows:
  status: уточнить отдельным файлом Эммы
  temporary_rule:
    - не давать Эмме автоматическое знание полного прошлого Акиры
    - может знать медицинские/текущие признаки только если это закреплено сценой или её файлом

irei_knows:
  status: уточнить отдельным файлом Ирэя
  temporary_rule:
    - не давать Ирэю автоматическое знание полного прошлого Акиры
    - он может быть ближе к пространственной логике, но не управляет её потоком и не знает всё без основания

livia_olivia_knows:
  academy_past:
    - была близкой подругой Акиры
    - знала бытовые привычки Академии
    - была спасена Акирой во время рейда/проявления кайроса
    - отвернулась после раскрытия от шока, не из злобы
  current_1206:
    - связь уточнять по отдельным файлам, если Ливия появится

kir_knows:
  academy_past:
    - был другом Акиры
    - не загружать все подробности без отдельного файла Кира

pov_rules:
  do_not_reveal_to_akira_automatically:
    - что она чистокровный кайрос
    - что Джун не биологический отец
    - что барьер Джуна не давал ей уйти
    - что удостоверение было командирским из Северного сектора
    - что кольцо связано с Райденом
    - что шрам связан с потерей ребёнка
    - что она стёрла память Райдена
    - что Самуэль подстроил её раскрытие
    - полный механизм самоблокировки
  allow_as_thought_clues:
    - взгляд на след от кольца
    - вопрос, почему Джун ничего не объяснил
    - реакция на шрам
    - вода как странная глубина/граница
    - нож в руке как неправильный бытовой хват
    - бесшумный шаг
    - окно второго этажа как привычный выход
    - знакомость тепла, холода, голоса, шума
  forbidden:
    - не делать Акиру всезнающей
    - не раскрывать скрытый лор авторским монологом
    - не давать NPC знания без файла/сцены
    - не путать Рэя Картера и Райдена
    - не писать, что Акира стала навсегда психически нестабильной
    - не писать, что любой возврат памяти автоматически ломает её
    - не писать, что Самуэль или кто-то другой заблокировал её финальную память/поток
