id: akira
file_type: character_main_profile
version: clean_main_profile_v3_energy_hooks_no_metaphor_spam

purpose: >
  Главная активная анкета Акиры. Этот файл подтягивается всегда и даёт плотное
  понимание персонажа: внешность, тело, голос, характер, привычки, базовое поведение,
  тип энергии и запреты. Не хранить здесь прошлое, текущие проценты, динамический state,
  отношения, сценические события и восстановленные/невосстановленные воспоминания.

identity:
  name: "Акира"
  known_surnames:
    current_public: "Картер - прошлая фамилия, скрытая информация"
    past_documented: "Акатсуми"
  close_name: "Кира"
  close_name_rule: >
    Близкое имя используют только персонажи, у которых есть на это право и память/основание.
    Не давать новым или забывшим персонажам автоматически называть её Кирой.
  pov_character: true
  player_character: true

basic_info:
  gender: "female"
  age: 25
  height_cm: 165
  role: "главный POV-персонаж"
  surface_status: "девушка с частично потерянной памятью, которую долго скрывали от внешнего мира"

appearance:
  overall_impression: >
    Беловолосая, собранная, холодная с виду. Не выглядит истеричной или сломанной.
    Опасность в ней считывается через тишину, точность, отсутствие лишних реакций
    и слишком спокойный взгляд.
  beauty_type: "редкая, холодная, неуютная красота; на неё смотрят, но не всегда решаются подойти"
  hair:
    color: "чисто белые / платиново-белые"
    length: "длинные"
    texture: "густые, тяжёлые по длине"
    bangs: false
    rule:
      - "не делать волосы короткими без отдельного периода/события"
      - "не добавлять чёлку без явного указания"
      - "волосы могут привлекать внимание, но не должны превращать каждую сцену в обсуждение волос"
  eyes:
    color: "карие, почти чёрные; при свете могут казаться янтарно-красноватыми"
    look: "ровный, внимательный, оценивающий, холодный"
    rule:
      - "не делать глаза светлыми"
      - "не раскрывать скрытую природу через цвет глаз без сценического основания"
  face:
    expression: "сдержанная, сухая, почти безэмоциональная"
    smile: "редкая ядовитая улыбка; мягкая внешне, неприятная по смыслу"
    real_smile: "очень редкая; появляется только при сильном человеческом моменте"
  body:
    build: "невысокая, гибкая, собранная"
    proportions: "сильные ноги, широкие бёдра, небольшая грудь, руки слабее ног"
    movement: "экономные точные движения; сила не в массе, а в угле, скорости, устойчивости и технике"
    visual_rule:
      - "не делать качком"
      - "не делать хрупкой декоративной девочкой"
      - "тело должно ощущаться подготовленным, но не на пике"

