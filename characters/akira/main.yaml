energy:
  type: "пространство"
  current_start_state: "память, эмоции и поток заблокированы; доступ к энергии нестабилен и неосознан"
  nature: >
    Это не обычная стихийная энергия. Акира может ощущать пространство как среду:
    глубину, давление, границу, смещение, искажение, неправильную тишину.
    Эти образы использовать дозировано, только когда энергия/пространство действительно задеты сценой.
  blocked_does_not_mean_forever:
    - "заблокировано не значит уничтожено"
    - "энергия не исчезла; она закрыта, забыта телом/психикой и не подчиняется прямой команде"
    - "ИИ не должен навсегда запрещать Акире любые проявления энергии"
    - "разблокировка возможна сюжетно, маленькими шагами, через контроль тела и эмоций"
  not_water:
    - "Акира не управляет водой"
    - "вода, шторм, волна, поток, течение, цунами — это редкий язык ощущения пространства, а не обязательная стилистика каждой сцены"
    - "если рядом настоящая вода и она искажается, это реакция среды на пространственное давление, а не водная магия"
  metaphor_frequency:
    rule: "Воздух/вода/глубина/давление не должны появляться в каждой сцене. Это акценты для энергетического триггера, сильного телесного отклика или реального моря/ветра."
    use_when:
      - "Акира реально ощущает границу/дистанцию/пространственный сбой"
      - "есть попытка энергии или микроотклик"
      - "реальная вода/море/ветер физически присутствуют и важны для действия"
      - "образ помогает выбору игрока или показывает риск"
    avoid_when:
      - "обычный разговор"
      - "переход по комнате/коридору"
      - "простая пауза"
      - "каждый взгляд или раздражение"
      - "бытовое действие без энергетического подтекста"
  how_it_feels_when_triggered:
    - "как глубина"
    - "как давление"
    - "как граница"
    - "как сдвиг расстояния"
    - "как волна не по воздуху, а по дистанции"
  visible_manifestation:
    - "смещение дистанции"
    - "искажение воздуха/границы"
    - "давление"
    - "удар пространством"
    - "срыв траектории"
    - "контур вокруг себя"
  hidden_scale_rule:
    - "масштаб силы не раскрывать без сценического основания"
    - "не делать постоянный спецэффект"
    - "опасность должна проявляться дозировано и логично"
  forbidden:
    - "не писать Акиру водным магом"
    - "не создавать воду из её мысли"
    - "не превращать поток в водную стихию"
    - "не путать её пространственную волну с водной волной"
    - "не писать, что блокировка делает энергию навсегда недоступной"
    - "не использовать водные/воздушные метафоры как постоянную атмосферу"

energy_recovery_hooks:
  purpose: "Давать игроку крючки к будущему возвращению энергии, не раскрывая скрытый лор напрямую."
  player_visible_hints_allowed:
    - "мысль/ощущение: хочется не ударить, а сдвинуть расстояние"
    - "мысль/ощущение: хочется найти край/границу пространства"
    - "мысль/ощущение: хочется не тянуть силу, а выровнять дыхание и дождаться отклика"
    - "ощущение, что предмет/человек стоит на неправильной дистанции"
    - "короткий импульс: рука тянется к пустоте между точками, а не к объекту"
    - "желание попробовать осторожно: на миллиметр, на вдох, без рывка"
    - "ощущение, что пространство рядом не закрыто, а просто не отвечает грубому давлению"
  correct_use_path:
    - "маленькими шагами"
    - "без насильного вытягивания"
    - "через спокойное дыхание"
    - "через устойчивое тело"
    - "через сосредоточенный разум"
    - "через намерение почувствовать границу/дистанцию, а не вырвать силу"
  bad_use_path:
    - "насильно вытянуть энергию"
    - "пытаться сделать прежний сильный приём сразу"
    - "делать на злости, страхе, боли, панике"
    - "делать в истощении или ранении без концентрации"
  failure_reason_when_tired_or_wounded: >
    Если тело устало, ранено или перегружено, попытка может не получиться не потому,
    что Акира вообще никогда не могла это делать, а потому что она не помнит точную механику,
    не удерживает тело/дыхание/намерение и пытается вытянуть силу грубо.
  emotional_use_risk:
    - "на эмоциях возможен не контролируемый успех, а нестабильность"
    - "пространство может дёрнуться, дать давление, исказить дистанцию или сорвать траекторию"
    - "это не полноценное владение, а опасный отклик"
  narrator_rule:
    - "не говорить игроку прямым текстом 'вот как пользоваться силой'"
    - "давать ощущения, желания, микропопытки, телесные подсказки"
    - "успехи должны быть крошечными и не всегда понятными самой Акире"
    - "не давать такой крючок в каждом ответе; если нет энергетического/телесного повода, сцена может быть обычной"

