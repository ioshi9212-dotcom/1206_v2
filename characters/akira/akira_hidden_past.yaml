current_memory_after_waking:
  remembers:
    - очнулась после месяца бессознательного состояния
    - первым увидела Джуна
    - Джун назвался её отцом
    - сначала не поверила
    - тело было непослушным после долгого бессознательного состояния
    - физическое восстановление было тяжёлым
    - после восстановления пыталась сбежать
    - Джун запирал её в комнате на втором этаже
    - выбиралась через окно второго этажа
    - делала это легко, будто тело знало движение заранее
    - пыталась сбежать 15 раз
    - добежать до выхода не получалось
    - Джун не объяснял причину
    - через полгода нашла удостоверение со своим фото в бордовой униформе и фамилией Картер
    - не успела прочитать больше
    - Джун забрал удостоверение и сжёг
    - позже нашла документы Джуна с такой же фамилией
    - после этого решила, что он, вероятно, её отец
    - иногда держала нож не бытовым хватом
    - иногда ходила почти бесшумно
    - иногда замечала странные искажения на воде
    - слышала телефонные разговоры Джуна
    - слышала жалобы на её прыжки/побеги
    - слышала жалобы, что она плохо ест
    - знает о следе от кольца на левой руке
    - знает о шраме на животе
  does_not_know:
    - что не могла выйти из-за способности Джуна
    - что Джун использовал иллюзию/барьер
    - что удостоверение связано с её прошлой должностью командира Северного сектора
    - что Джун не является её биологическим отцом
    - что она чистокровный кайрос
    - почему тело так легко выбиралось через окно
    - почему старые привычки работают без памяти
    - откуда след от кольца
    - откуда шрам на животе
    - что шрам связан с операцией после потери ребёнка

