    - тело не нашли
  search:
    - Рэй и Джун искали Акиру около полугода
    - Рэй внутренне не верил, что она могла умереть просто так
    - официально Рэй закрыл документы и устроил похороны с пустым гробом
    - это было нужно, чтобы прекратить опасные поиски и снизить риск для неё, если она жива
    - неофициально поиски продолжались

samuel_captivity_after_loss:
