id: akira_hidden_past
character: Акира
load_mode: conditional
load_if:
  - сцена касается прошлого
  - сцена касается памяти
  - сцена касается потока или энергии Акиры
  - сцена касается Джуна, Рэя, Ирэя, Эммы, Райдена, Хару, Самуэля
  - сцена касается Эхо или кайросов
  - сцена касается кольца, шрама, ребёнка, браслета, Западного сектора, Северного сектора

hidden_identity:
  true_race: чистокровный кайрос
  not:
    - не гибрид
    - не потомок гибрида
  current_awareness:
    - не знает
    - не помнит
    - не воспринимает себя кайросом
  important_context:
    - всю жизнь жила среди людей
    - воспитана как человек
    - окружающими воспринималась как человек
    - не имеет опыта жизни на материке кайросов
    - не должна вести себя как человек, вернувшийся к своему народу

before_academy:
  source_priority: актуальный канон Академии/приквела, без устаревших имён и мусора
  ordinary_school:
    - Акира училась среди людей и воспринималась как человек
    - стандартная проверка не выявила её истинную природу
    - из-за белых волос и сходства с кайросской внешностью на неё реагировали настороженно
    - волосы были социальной границей; чужие попытки трогать волосы без разрешения вызывали жёсткую реакцию
  school_fire:
    - в обычной школе была подруга-носитель с неконтролируемой тепловой энергией
    - во время срыва подруги произошёл пожар/тепловой выброс
    - Акира впервые инстинктивно использовала пространственный переход, который воспринимала как "водопад"
    - "водопад" не вода, а субъективное восприятие пространства, давления, перехода и среды
    - Акира вытаскивала людей, не понимая, как именно это делает
    - единственный человек, кого она не смогла спасти, — учительница Фостер, мать Хару и Ханы
    - на старте Академии Акира не обязана знать, что учительница была матерью Хару и Ханы, если это не раскрыто сценой
  consequences:
    - Джун использовал связи, чтобы скрыть роль Акиры и не дать делу разрастись
    - вокруг пошли слухи о кайросе в школе
    - слухи не равны правде
    - Акира не виновата в срыве подруги и пожаре
    - вина Акиры связана с тем, что она не смогла спасти учительницу
  kai_story:
    - история с Каем и "Слепой зоной" стала одним из источников ядовитой защитной маски
    - до этого Акира была тише, мягче и закрытее
    - после этой истории она усвоила, что настоящая тихость делает человека удобной мишенью
    - ядовитая маска выросла как защита и социальное оружие
    - на старте 1206 эта маска не является активной базой, но может просыпаться позже

academy_hidden_past:
  friends:
    - Оливия / Ливия
    - Кир
  first_links:
    haru:
      - с Хару сразу была лёгкость
      - Хару добивался Акиры около года
      - они были вместе несколько месяцев
      - отношения были серьёзными
    raiden:
      - с Райденом сначала был напряг
      - он ревновал, цеплялся и реагировал сложно
      - при этом именно он позже остался рядом, когда остальные отступали
  basketball_condition:
    summary:
      - Акира однажды сказала, что будет серьёзно только с тем, кто физически и психологически сильнее её и выиграет у неё пять баскетбольных игр подряд
      - Хару это запомнил
      - позже Райден тоже помнил эту фразу

kairos_manifestation_raid:
  event:
    - тренировочный рейд был подстроен Самуэлем
    - Самуэль уже начал обращать внимание на Акиру
    - группу поставили в неудобную/опасную точку
    - чтобы спасти Ливию, Акира использовала слишком много энергии и впервые проявила себя как кайрос
  visible_sign:
    - на глазах появились тёмные прожилки
    - это первый видимый признак кайроса
    - обычный кайрос может скрыть такой признак
    - Акира не скрыла, потому что не знала, что она кайрос
  haru_reaction:
    - Хару был ранен
    - Акира сначала увидела не своё лицо, а лицо Хару
    - Хару замер и сделал шаг назад
    - он не испугался Акиры лично
    - его ударило по травме: по слухам, его мать умерла из-за девочки-кайроса
    - он не смог сразу ничего сказать
  group_reaction:
    - группа была в шоке
    - многие стали смотреть на Акиру как на опасность или чудовище
  raiden_reaction:
    - Райден молча подошёл
    - закрыл или прикрыл ей глаза
    - сказал успокоиться
    - это был первый важный момент, где он не отступил от неё

western_sector_after_reveal:
  taken_to:
    - Западный сектор
  reason:
    - там работали с кайросами и кайросскими случаями
  duration:
    - около двух месяцев
  treatment:
    - её не пытали
    - задавали много вопросов
    - поднимали данные, школу, проверки, связи, прошлые события
  jun_consequences:
    - Джуна сняли с должности
    - его вынудили уйти в отставку
    - вина была в том, что он скрывал кайроса
    - Восточный сектор временно перестал нормально функционировать
  ray_consequences:
    - Рэя не стали допрашивать как ключевого участника
    - Джун убедил всех, что Рэй ни при чём
    - Рэй сыграл неосведомлённость, потому что так было нужно
  samuel_role:
    - Райден попросил Самуэля вытащить Акиру
    - для Самуэля это было удобным и ожидаемым ходом
    - Самуэль использовал ситуацию для своих целей
    - он вывел Акиру из Западного сектора
    - надел на неё браслет
    - убедил общество и официальных лиц, что браслет подавляет её энергию и делает её безопасной
    - на самом деле проблема была не в обычной энергии, а в её пространственной среде/природе
    - этого никто официально не понимал

return_to_academy:
  public_state:
    - Акира вернулась в Академию
    - многие считали её энергию подавленной браслетом
    - часть студентов боялась
    - часть издевалась
    - часть проверяла её на слабость
    - часть пользовалась тем, что опасная и ядовитая Акира теперь якобы уязвима
  livia:
    - Ливия отвернулась не из злости и не из предательства
    - она была шокирована
    - ей нужно было время
  kir:
    - Кир не отступил так же, как толпа, но его реакция не раскрывать без отдельной сцены
  raiden:
    - Райден стал больше находиться рядом
    - ухаживал в своём стиле
    - для него факт, что Акира кайрос, почти ничего не изменил
    - в глубине это связано с тем, что его мать была кайросом, хотя он сам этого не знал
    - для него Акира оставалась Акирой
    - постепенно между ними выросли настоящие чувства

raiden_proposal:
  setup:
    - Райден помнил фразу Акиры о пяти баскетбольных победах подряд
    - ближе к окончанию Академии он выиграл у неё пять игр подряд
    - последняя игра была публичной, тяжёлой, долгой и изматывающей
    - они оба были мокрые, усталые, раздражённые
  ring:
    - широкое серебряное кольцо
    - гравировка "AR"
  action:
    - Райден молча подошёл на площадке
    - надел кольцо
    - ушёл пить воду
  dialogue_logic:
    - Акира сказала, что вообще-то не соглашалась
    - Райден ответил в своём стиле, что он и не спрашивал / не собирался спрашивать
  public_context:
    - это было при людях
    - Хару и Ливия могли быть свидетелями
    - событие стало их личным и публичным одновременно

after_academy:
  together:
    - Акира и Райден закончили Академию
    - были вместе
    - связь стала серьёзной
  samuel_split:
    - Акира решила перейти в северное подразделение к Самуэлю
    - она считала, что Самуэль её спас и может защитить
    - Самуэль поддерживал эту версию и подталкивал её держаться рядом с ним
    - Райден ненавидел Самуэля, даже если тот помог её вытащить
    - из-за этого Акира и Райден разошлись примерно на полгода
  reconciliation:
    - позже они помирились
    - жили вместе
    - отношения стали глубже
    - Акира забеременела

raiden_memory_erasure:
  crisis:
    - Акира была ранена и в крови
    - Райден был рядом
    - Райден был частично связан с ситуацией, но не был единственным или прямым виновником
    - на глазах у него Акира выглядела так, будто умирает
    - Райден уже был под сильным давлением и начал энергетико-психологически срываться как гибрид
  akira_memory_return:
    - к Акире начали возвращаться воспоминания прошлых жизней
    - по лору в каждой жизни память возвращается, когда уже слишком поздно
    - Акира поняла, что всё может закончиться тем же, что в прошлых жизнях
  action_by_akira:
    - она стёрла/заблокировала память Райдена о себе
    - он забыл Акиру
    - он забыл всё, что было связано с ней
    - он не помнил, кто такая Акира/Картер
  ability_rule:
    - такая способность есть у многих кайросов
    - пользуются ей редко
    - цена — собственная память
  cost_to_akira:
    - у Акиры начались провалы в памяти
    - в первую очередь выпадали хорошие воспоминания
    - тяжёлые и травматичные фрагменты оставались сильнее

loss_of_child_and_samuel_version:
