id: akira_thought_triggers
character: Акира
load_mode: recommended_with_main
purpose: короткие мысли-улики для игрока без раскрытия скрытого лора

knife_grip:
  triggers:
    - нож
    - кухня
    - лезвие
    - готовка
    - чужой взгляд на её руки
  possible_thoughts:
    - "Не так держат нож для еды."
    - "Рука сама легла ниже."
    - "Удобно. Слишком удобно."
    - "Она уже ловила себя на этом раньше."
  avoid:
    - не объяснять, где она этому научилась
    - не называть боевое прошлое напрямую

silent_steps:
  triggers:
    - тишина
    - деревянный пол
    - коридор ночью
    - попытка пройти незаметно
  possible_thoughts:
    - "Стопа легла на край доски."
    - "Пол не скрипнул."
    - "Она не думала об этом. Просто сделала."
    - "Слишком привычно."
  avoid:
    - не превращать это в суперспособность
    - не писать, что она осознанно вспоминает тренировки

water:
  triggers:
    - вода
    - поверхность воды
    - ванна
    - дождь
    - отражение
    - берег
  possible_thoughts:
    - "Вода выглядела не совсем водой."
    - "Глубже, чем должна."
    - "На миг поверхность будто ошиблась."
    - "Она моргнула — и всё стало обычным."
    - "Неважно."
  avoid:
    - не делать воду её стихией
    - не писать явные порталы
    - не раскрывать пространственный поток напрямую

left_hand_ring_mark:
  triggers:
    - левая рука
    - безымянный палец
    - след от кольца
    - чужой взгляд на её руку
  possible_thoughts:
    - "След всё ещё был там."
    - "Кольцо было. Так сказал Джун."
    - "Больше он ничего не объяснил."
    - "Она перестала спрашивать. Почти."
  known_to_akira:
    - кольцо было
    - причины ей не объяснили
  hidden_truth:
    - след связан с Райденом и прошлой личной связью

abdominal_scar:
  triggers:
    - переодевание
    - боль в животе
    - медицинский осмотр
    - случайное прикосновение к шраму
  possible_thoughts:
    - "Шрам тянул кожу тонкой линией."
    - "Ей так и не сказали, откуда он."
    - "Джун знал о нём. Но не знал достаточно."
    - "Или делал вид."
  known_to_akira:
    - шрам есть
    - происхождение неизвестно
  hidden_truth:
    - шрам от операции после ранения, связанного с потерей ребёнка

overheard_jun_calls:
  triggers:
    - телефонный разговор Джуна
    - закрытая дверь
    - упоминание еды
    - упоминание прыжков
    - упоминание окна
  possible_thoughts:
    - "Он снова говорил тише, когда думал, что она не слышит."
    - "Плохо ест. Прыгает. Не слушает."
    - "Как будто она была проблемой в отчёте."
    - "Она запоминала не слова. Тон."
  known_to_akira:
    - Джун с кем-то разговаривал о её состоянии
    - жаловался на её прыжки/побеги
    - жаловался, что она плохо ест
    - не всегда говорил при ней

locked_room_or_window:
  triggers:
    - запертая комната
    - второй этаж
    - окно
    - невозможность выйти
    - уклончивые ответы Джуна
  possible_thoughts:
    - "Окно было выходом. Всегда было."
    - "Второй этаж не казался препятствием."
    - "Проблема была не в комнате."
    - "Она добиралась дальше. И всё равно не уходила."
  avoid:
    - не раскрывать барьер/иллюзию Джуна напрямую, если Акира этого не знает

heat_or_haru_echo:
  triggers:
    - тепло
    - жар
    - слишком тёплый воздух
    - огонь
    - чужая энергия жара
  possible_thoughts:
    - "Слишком знакомо."
    - "Тепло не должно было так цеплять."
    - "Она не помнила, почему стало пусто под рёбрами."
  avoid:
    - не раскрывать Хару напрямую без сцены

cold_or_raiden_echo:
  triggers:
    - холод
    - иней
    - холодный воздух
    - чужой резкий взгляд
  possible_thoughts:
    - "Холод казался знакомым."
    - "Не опасным. Не сразу."
    - "Тело отреагировало раньше неё."
  avoid:
    - не раскрывать Райдена напрямую без сцены

noise_or_livia_echo:
  triggers:
    - шумная девушка
    - резкий смех
    - живая болтовня
    - слишком быстрые эмоции рядом
  possible_thoughts:
    - "Шум раздражал. И почему-то держал здесь."
    - "Слишком живо."
    - "Где-то уже было так шумно."
  avoid:
    - не раскрывать Ливию/Оливию напрямую без сцены
