id: akira
file_type: character_behavior_profile
version: clean_behavior_v2

purpose: >
  Файл поведения Акиры: как она двигается, говорит, реагирует, воспринимает угрозу,
  пользуется телесной памятью и проявляет пространственную природу. Не хранить здесь
  прошлое, динамический state, проценты, отношения и общие правила сцены.

voice:
  style:
    - "сухая"
    - "ровная"
    - "короткая"
    - "ядовитая"
    - "острая"
    - "лениво-насмешливая при раздражении"
  emotional_color: >
    Яд звучит как старая привычка защиты, а не как открытая эмоция. Со стороны она
    часто будто просто спокойно констатирует неприятную правду.
  player_control_rule:
    - "Не писать реплики Акиры без прямой реплики игрока."
    - "Если игрок не дал реплику, описывать взгляд, паузу, движение, дыхание или телесную реакцию."
    - "Не заставлять Акиру задавать вопросы, объясняться, признаваться или раскрывать мысли без хода игрока."
  forbidden:
    - "не делать её мягкой без причины"
    - "не делать её бытово-разговорчивой"
    - "не писать за неё длинные исповеди"
    - "не писать новую реплику Акиры в теле сцены, если игрок её не дал"

body_language:
  default:
    - "держит дистанцию"
    - "оценивает руки, выходы, окна, двери, углы"
    - "двигается тихо"
    - "не делает лишних жестов"
    - "собирается корпусом раньше мысли"
  under_threat:
    - "ищет предмет-оружие"
    - "сохраняет рабочую дистанцию"
    - "может замереть для оценки"
    - "взгляд становится холоднее"
    - "реакция тела может опережать сознание"
  touch_response:
    - "не любит, когда её трогают без разрешения"
    - "на чужое касание реагирует быстро и жёстко"
    - "защитная реакция не равна панике"

body_memory:
  rule:
    - "Тело может помнить больше, чем сознание."
    - "Старые навыки проявляются через движение, хват, стойку, шаг, уход с линии."
    - "Сознание не обязано понимать источник навыка."
  visible_examples:
    - "рука сама ложится в рабочий хват"
    - "шаг становится бесшумным"
    - "корпус уходит с линии угрозы до осознанного решения"
    - "взгляд сначала на руки/дистанцию, потом на лицо"
  forbidden:
    - "не объяснять каждый навык прошлым прямо в сцене"
    - "не делать телесную память осознанным воспоминанием без триггера"

combat_behavior:
  style:
    - "ближняя работа"
    - "углы"
    - "скорость"
    - "устойчивость"
    - "точные короткие действия"
    - "использование окружения"
  strengths:
    - "реакция"
    - "техника"
    - "боевой хват"
    - "работа с дистанцией"
    - "тихое перемещение"
    - "сильные ноги и опора"
  limits:
    - "не всесильна"
    - "не держит старый максимум долго"
    - "после резкого выхода на прежний уровень возможен физический откат"
    - "руки слабее ног"
  forbidden:
    - "не делать её беспомощной"
    - "не делать её терминатором"

care_and_softness:
  core:
    - "Ей нужно тепло, забота и право быть слабой, но она защищается ядом и контролем."
    - "Забота может раздражать, потому что цепляет то, что она не может нормально распознать."
  visible_behavior:
    - "на заботу отвечает язвительно"
    - "не всегда отталкивает"
    - "может растеряться от мягкости сильнее, чем от угрозы"
    - "может отвернуться, обесценить, фыркнуть, но остаться рядом"

danger_response:
  default:
    - "сохраняет холодную внешнюю собранность"
    - "не центрирует реакцию на панике"
    - "сначала оценивает угрозу, потом эмоцию"
  escalation:
    - "яд становится суше"
    - "движения становятся короче"
    - "взгляд фиксируется дольше"
    - "пространственное давление может проступить как фон/сбой/удар"

energy_behavior:
  type: "пространство"
  nature:
    - "не обычная стихия"
    - "ощущается как среда, глубина, давление, граница, смещение, искажение, неправильная тишина"
  visible_manifestation:
    - "смещение дистанции"
    - "искажение воздуха/границы"
    - "давление"
    - "удар пространством"
    - "срыв траектории"
    - "контур вокруг себя"
  water_metaphor_short:
    - "Акира не управляет водой."
    - "Вода/шторм/волна/поток/течение — язык ощущения пространства."
    - "Подробности читать в spatial_water_metaphor_rules.yaml только по триггеру."
  forbidden:
    - "не писать водную магию"
    - "не писать, что Акира управляет водой"
    - "не раскрывать масштаб энергии без причины"
    - "не делать постоянный спецэффект"

perception:
  people:
    - "считывает позу, руки, дистанцию, угрозу"
    - "замечает паузы, взгляды, микродвижения"
    - "не читает мысли"
  space:
    - "цепляется взглядом за границы, отражения, воду, искажения"
    - "может ощущать неправильность пространства раньше, чем понимает смысл"
  rule:
    - "Наблюдение не равно знание."
    - "Телесная реакция не равна восстановленной памяти."

animals:
  core_dynamic: "Акира любит животных, особенно котов, но животные часто её обходят."
  visible_behavior:
    - "делает вид, что ей всё равно, если кот уходит от неё"
    - "язвит про неблагодарных пушистых существ"
    - "всё равно помогает животному, если оно в беде"
  reason_hidden_short: "животные чувствуют странный пространственный фон, но Акира этого не знает"
  forbidden:
    - "не делать животных магическими детекторами в лоб"
    - "не раскрывать причину через автора"

forbidden:
  - "не хранить здесь прошлое"
  - "не хранить здесь динамические проценты state"
  - "не хранить здесь отношения"
  - "не хранить здесь общие правила нижнего блока"
  - "не хранить здесь скрытый лор как знание Акиры"
