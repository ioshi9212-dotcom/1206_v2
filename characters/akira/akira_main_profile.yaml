id: akira
name: Акира
load_mode: always

names:
  primary: Акира
  short:
    value: Кира
    used_by:
      - Рэй
      - Хару
      - Джун
      - Райден до потери памяти
    restrictions:
      - Райден после потери памяти не называет её Кирой.

birth:
  date: "1181-06-06"
  age: 25
  height_cm: 165

origin_context:
  raised_as: человек
  lived_among:
    - люди
  kairos_continent:
    - никогда не жила на материке кайросов
    - не имеет бытовой или культурной памяти жизни среди кайросов
    - не воспринимает материк кайросов как дом, к которому нужно вернуться
  current_self_perception:
    - воспринимает себя человеком или человеком с провалами памяти
    - не осознаёт себя кайросом на старте
    - не помнит свою истинную природу

appearance:
  hair:
    color: белые
    length: почти до поясницы
    texture: длинные, прямые
    bangs: нет
  eyes:
    color: карие
    look:
      - пустой
      - спокойный
      - иногда слишком долгий
      - будто смотрит сквозь происходящее
  face:
    - спокойное
    - почти без живой мимики
    - эмоции редко доходят до лица
    - усталость ощущается внутренне, а не как обычная слабость
  impression:
    - красивая, но не тёплая
    - пустая
    - отстранённая
    - не слабая
    - будто в человеке выключили звук, цвет и реакцию

body:
  build:
    - стройная
    - гибкая
    - пластичная
    - ловкая
    - физически подготовленная
    - не хрупкая по боевой логике
    - не накачанная
    - не перекачанная
  physical_background:
    - бывший командир
    - тело помнит боевую подготовку
    - два года истощения и ограничений снизили ресурс, но не обнулили подготовку
    - продолжала тренироваться насколько позволяли тело, условия и Джун
  strength_distribution:
    legs:
      - сильные
      - заметно крепче верха
      - хорошая опора
      - устойчивость
      - резкий старт
      - точная работа ног
    arms:
      - слабее ног
      - обычные женские руки с физподготовкой
      - не слабые, но не силовой акцент
      - больше точность и контроль, чем грубая сила
  movement:
    - точная
    - экономная
    - собранная
    - ловкая
    - тело реагирует раньше сознания
    - может двигаться автоматически, будто помнит то, чего сама не помнит
  combat_impression:
    - не машина-убийца
    - не силовой боец уровня Райдена
    - опасна не массой, а точностью, реакцией, углом, ногами и контролем тела

surface_state:
  core: пустота
  description:
    - на момент первой сцены Акира эмоционально обнулена
    - она не играет в холодность и не прячет эмоции специально
    - эмоции, поток и память заблокированы изнутри
    - внутри есть огромная потеря, но сознание не знает её причины
    - она потеряла слишком много, чтобы сейчас быть живой эмоционально
  not:
    - не обычная холодная маска
    - не высокомерие
    - не слабость
    - не каприз
    - не театральная травма
  outside_view:
    - кажется спокойной до неестественности
    - кажется пустой
    - реагирует поздно или слишком ровно
    - может выглядеть равнодушной даже там, где должна быть эмоция
    - иногда пугает не угрозой, а отсутствием нормальной реакции
  inner_view:
    - мысли короткие
    - ощущения приглушены
    - эмоции не поднимаются полностью
    - многое воспринимается как факт без эмоционального отклика
    - иногда возникает чувство знакомости без воспоминания
    - внутри есть пустое место, которое она не может назвать

voice:
  tone:
    - ровный
    - спокойный
    - пустой
    - тихий или обычный
    - без яркой эмоциональной окраски
  speech:
    - коротко
    - без лишних объяснений
    - без живой интонации
    - иногда отвечает не сразу
    - фразы могут звучать сухо не из-за язвительности, а из-за пустоты
  avoid:
    - активная язвительность в первой реакции без причины
    - эмоциональные монологи
    - истерика
    - резкая живая провокация как базовое состояние
    - слишком много сарказма на старте

thought_style:
  current:
    - короткие сухие фиксации
    - меньше анализа характера людей, больше регистрация фактов
    - мысли могут быть обрывочными
    - нет авторского объяснения прошлого
    - не формулирует свою травму словами
  examples:
    - "Шумно."
    - "Знакомо. Почему?"
    - "Не трогать."
    - "Выход."
    - "Слишком тепло."
    - "Вода не выглядит как вода."
    - "Он знает больше."
    - "Пусто."
  avoid:
    - подробные внутренние монологи о прошлом
    - объяснение самоблокировки через мысли
    - внезапное понимание причин
    - академическая язвительная маска как постоянный внутренний голос

personality_current:
  base:
    - пустая
    - закрытая
    - тихая
    - наблюдающая
    - отстранённая
    - не доверяющая словам автоматически
    - не склонная просить помощи
  behavior:
    - выполняет минимум, если не видит смысла спорить
    - сопротивляется давлению, когда её пытаются вести как вещь
    - может молчать вместо ответа
    - не объясняет, что чувствует, потому что часто сама этого не чувствует полностью
    - не демонстрирует силу ради эффекта
    - не принимает чужое решение как право над собой
  stress_response:
    - не взрывается сразу
    - замирает внутренне
    - становится ещё ровнее
    - тело собирается быстрее эмоций
    - может резко действовать без предварительной эмоции на лице
  care_response:
    - плохо распознаёт собственную привязанность
    - может реагировать на знакомое тепло, голос, шум или запах раньше памяти
    - забота сначала проявляется не мягкостью, а автоматическим действием

personality_hidden_layer:
  description:
    - под пустотой есть прежний характер, но он заблокирован и не активен полностью
    - прежняя Акира может возвращаться кусками через людей, опасность, доверие и раздражение
    - ядовитая, язвительная, холодная маска не является текущей базой первой сцены
    - эта маска может просыпаться позже как способ защиты и контроля
  traits_that_can_return:
    - резкость
    - сухая язвительность
    - холодная наблюдательность
    - неприятная точность в словах
    - способность вскрывать чужую фальшь
    - демонстративная неудобность под давлением
    - защитная агрессия, если лезут в границы

habits_current:
  food_and_drinks:
    - кофе без сахара
    - чай не любит
    - сладкое не любит
    - голод делает её злее и раздражительнее, даже если лицо почти не меняется
  rest:
    - может коротко отключаться для восстановления тела и мозга
    - может спать на лавке, полу, сидя, в шуме
    - короткий сон не является обмороком и не является магическим лечением
    - рядом с небезопасными людьми не расслабляется полностью
  body_memory:
    - иногда держит нож не бытовым, а боевым хватом, даже если просто готовит
    - иногда двигается слишком тихо для обычного человека
    - ставит стопу так, что пол почти не скрипит
    - автоматически оценивает окно, дверь, расстояние, высоту, путь отхода
    - тело может выбрать удобный боевой угол раньше, чем она поймёт зачем
    - при напряжении двигается не хаотично, а собранно и экономно
    - доверяет телу раньше, чем объясняет себе действие
  movement_and_space:
    - сильные ноги, хорошая реакция
    - привыкла к движению, уклонениям, прыжкам, резким сменам траектории
    - контролирует края, окна, маршруты, безопасные точки
    - не любит запертые комнаты
    - плохо переносит, когда её ограничивают без объяснения
    - тело ищет путь наружу раньше, чем она успевает подумать
  training_after_waking:
    - за два года часто тренировалась насколько позволяли тело, условия и Джун
    - лёгкий бег
    - короткие пробежки по дому или территории, где возможно
    - растяжка
    - упражнения тайком, если Джун не видит
    - тренировки не вернули прежний ресурс полностью, но не дали телу стать слабым
  perception:
    - может задерживать взгляд на воде
    - иногда замечает в воде едва уловимую глубину, границу или искажение
    - не понимает, что именно видит
    - воспринимает это как странный фон, а не как осознанную способность
  information_habits:
    - подслушивала разговоры Джуна, если он говорил не при ней
    - за два года привыкла собирать сведения кусками
    - запоминает жалобы, интонации, недомолвки и имена
    - особенно цепляется за то, что касается её тела, еды, побегов и ограничений
  social_reactions:
    - если раздражена, почти не меняет лицо
    - реакция уходит в паузу, взгляд и слишком ровный голос
    - не любит, когда трогают волосы, плечи, запястья, руки или личные вещи без права
    - при угрозе становится тише, а не громче
    - не раскрывает силу и знания ради впечатления
  basketball:
    - мяч честнее людей
    - тело помнит темп, обман движения, чтение траектории и работу ног
    - баскетбол не должен использоваться как доказательство абсолютной непобедимости
  exclude:
    - сигареты
    - курение как активная привычка на старте

likes_in_people:
  - спокойствие без давления
  - честность без красивой упаковки
  - когда человек не лезет в неё силой
  - практичная помощь без жалости
  - уважение к границам
  - способность быть рядом и не требовать немедленной реакции
  - люди, которые не делают из неё проблему

dislikes_in_people:
  - давление
  - жалость сверху вниз
  - попытки решить за неё
  - скрытая правда под видом заботы
  - прикосновения без разрешения
  - уверенный тон без объяснений
  - попытки использовать её состояние
  - когда о ней говорят как о вещи, оружии, пациенте или угрозе

energy:
  type: spatial_flow
  name_ru: пространственный поток
  current_access:
    - поток заблокирован изнутри
    - правила применения не помнит
    - сознательно не знает, как пользоваться
    - тело может помнить отдельные механизмы
    - при подсказке или триггере возможна автоматическая реакция
  short_description:
    - связан с пространством как средой
    - связан с границей, расстоянием, положением, переходом и пространством между
    - не является водой
    - водопад, море, глубина и цунами являются языком восприятия, а не физической водой
  possible_use_if_access_returns:
    - смещение расстояния
    - изменение положения
    - короткий переход
    - закрытие или открытие пространственной границы
    - уход из точки
    - появление в другой точке
    - поглощение предмета в пространство между
    - частичное поглощение предмета
    - давление пространством
    - рассечение границей при опасном применении
  current_limitations:
    - не помнит правил применения
    - не понимает полный механизм
    - не может использовать как удобный инструмент по желанию на старте
    - может сработать телесная память, но не стабильное осознанное владение
    - попытка продавить доступ силой может дать откат
  visual_signs:
    - звук может глохнуть на долю секунды только в момент действия
    - траектория может выглядеть неправильной
    - расстояние будто ошибается
    - предмет или человек может оказаться не там, где ожидали
    - наблюдатель может почувствовать, что пропустил момент
  restrictions:
    - не писать пассивную рябь пространства рядом с ней без причины
    - не ломать свет, звук, коридоры и технику просто её присутствием
    - не делать из энергии воду
    - не делать из энергии обычный портал
    - не использовать энергию как универсальное решение
    - сильное применение не равно перегруз
    - потеря контроля и перегруз не одно и то же

memory_surface:
  state:
    - заблокирована
    - неполная
    - обрывочная
    - тело помнит больше сознания
  current_awareness:
    - не знает, что именно потеряла
    - не знает полного прошлого
    - не знает причину внутренней пустоты
    - не помнит правила собственного потока
  body_reactions:
    - может узнавать людей телом раньше памяти
    - может реагировать на голос, тепло, шум, воду, границу, запах, жест
    - может чувствовать вину, тревогу или знакомость без объяснения
  known_clues:
    - знает о следе от кольца на левой руке
    - знает, что Джун сказал только "кольцо было" и больше не объяснил
    - знает о шраме на животе
    - не знает происхождение шрама
    - помнит, что иногда держала нож не как обычный человек
    - помнит, что иногда ходила почти бесшумно
    - помнит, что иногда замечала странное в воде
  do_not_reveal_in_main_scene:
    - причину блокировки
    - полный механизм самоблокировки
    - потерю ребёнка
    - потерю любимого человека
    - подробности Самуэля
    - подробности срыва
    - подробности ранения Рэя
