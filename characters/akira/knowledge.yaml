id: akira_knowledge
file_type: character_knowledge_profile
version: clean_knowledge_v3_energy_hooks

purpose: >
  Что Акира знает, чего не знает, что считает, что подозревает и какие выводы
  нельзя давать ей в мыслях. Это файл знаний Акиры, а не файл общего формата сцены.

core_rule:
  - "Игрок может знать больше, чем Акира."
  - "Акира не знает hidden lore автоматически."
  - "Рассказ другого персонажа не равен восстановленной памяти."
  - "Телесная реакция не равна осознанному знанию."
  - "Подозрение не равно факт."
  - "Наблюдение паузы/взгляда не даёт знания о чужой памяти."
  - "Крючок к энергии не равен знанию, как пользоваться энергией."

knows_for_sure:
  self:
    - "её зовут Акира"
    - "память неполная"
    - "последние годы помнит лучше, чем всё до них"
    - "с телом и реакциями что-то не совпадает с доступной памятью"
  jun:
    - "Джун назвался её отцом/опекуном"
    - "Джун скрывает больше, чем говорит"
    - "Джун заботился о ней и одновременно ограничивал"
    - "Джун говорил искать Рэя / Восточный сектор, если придут чужие"
  body:
    - "у неё есть след от кольца на левой руке"
    - "у неё есть шрам на животе"
    - "тело иногда действует раньше мысли"
    - "она умеет двигаться слишком тихо и слишком точно для обычной памяти"
  current_threat:
    - "в доме могут быть чужие"
    - "чужие голоса и давление — реальная угроза"
    - "не всем словам Джуна можно верить полностью"

believes:
  - "Джун, вероятно, связан с её прошлым ближе, чем говорит"
  - "если её скрывали, значит причина была опасной"
  - "её тело знает то, чего она не помнит"
  - "чужие хотят не просто поговорить"
  - "если что-то внутри не отвечает, это не всегда значит, что этого никогда не было"

suspects:
  - "Джун мог врать ради защиты"
  - "её документы могут быть ложными или неполными"
  - "некоторые реакции тела связаны с прошлым"
  - "некоторые люди узнают её, даже если она их не помнит"
  - "пространство вокруг иногда ведёт себя не как обычная среда"

does_not_know:
  self:
    - "истинную расу"
    - "полный масштаб пространственной природы"
    - "почему она сама заблокировала память/эмоции/поток"
    - "что именно произошло до пробуждения"
    - "точную механику безопасного использования пространства"
  jun:
    - "всю правду о том, кто он ей"
    - "полный механизм его ограничений/барьера"
  ray:
    - "полную роль Рэя"
    - "почему имя Рэя важно"
    - "что именно Рэй знает о ней"
  raiden:
    - "кто он для неё"
    - "что у них было прошлое"
    - "что он не помнит её"
    - "что она связана с его потерей памяти"
    - "что след кольца связан с ним"
  irey:
    - "кто он осознанно"
    - "что он знает о ней"
    - "почему он реагирует не как случайный чужой"
    - "что он может создать сенсорный якорь через касание"
  emma:
    - "её настоящие мотивы"
    - "полную связь с чужой системой"
  samuel:
    - "полную роль Самуэля"
    - "что именно он с ней делал"
  scar:
    - "истинную причину шрама"
    - "связь шрама с потерей ребёнка"

energy_thought_hooks:
  purpose: "Разрешённые мысли/ощущения, которые дают игроку путь к энергии, но не раскрывают hidden lore."
  allowed:
    - "Не ударить. Сдвинуть. Почему именно это слово?"
    - "Между мной и точкой было слишком много расстояния. Или слишком мало. Неправильно."
    - "Край. Нужно найти край. Не предмет — край вокруг него."
    - "Тянуть бесполезно. Чем сильнее тянешь, тем глуше становится внутри."
    - "Если дышать ровнее, давление не растёт. Оно будто ждёт."
    - "Я не знаю, как это делается. Но тело будто знает, что рывок — ошибка."
    - "На миллиметр. Не больше. Просто проверить, есть ли отклик."
    - "Пространство не вода. Но граница похожа на поверхность."
    - "Я хотела не шагнуть ближе, а убрать лишнюю дистанцию. Мысль исчезла слишком быстро."
    - "Если злиться, внутри не открывается. Внутри штормит."
  forbidden_as_direct_knowledge:
    - "я умею управлять пространством"
    - "мне нужно сделать конкретную технику"
    - "я вспомнила, как пользоваться энергией"
    - "моя блокировка снимается вот так"
    - "это моя истинная природа Кайроса"
  rule:
    - "крючки должны быть телесными, обрывочными, сомнительными"
    - "Акира может захотеть попробовать, но не должна сразу понимать механику"
    - "удачные маленькие попытки должны оставлять больше вопросов, чем ответов"

dangerous_wrong_outputs_for_akira_thoughts:
  forbidden:
    - "он меня не узнал"
    - "Райден не помнит меня"
    - "это наша связь"
    - "он почувствовал меня"
    - "Ирэй понял, что Райден меня не узнал"
    - "Эмма знает, что я Кайрос"
    - "шрам от ребёнка"
    - "это память тела о Райдене"
    - "я знаю, как снять блокировку"
    - "энергия навсегда недоступна"
  allowed_equivalents:
    - "Он смотрел слишком ровно для человека, который ничего не знает."
    - "Пауза была. Короткая, но была."
    - "Что-то в этом взгляде не сходилось."
    - "Холод прошёл под кожей и исчез."
    - "Ирэй тоже посмотрел. Не на меня — между нами."
    - "Мне не понравилось, как они замолчали."
    - "Внутри что-то не открылось. Не отказало — именно не открылось."
    - "Давление появилось и тут же ушло, как будто я взялась не с той стороны."

heard_words_rule:
  - "Если персонаж произнёс слово 'Кайрос', Акира может услышать слово."
  - "Услышать слово не значит понять скрытый лор."
  - "Если персонаж говорит о Самуэле, Акира может запомнить имя, но не обязана понимать роль."
  - "Любое новое знание должно попадать в learned_about_self/knowledge_state, а не в memory."

memory_vs_learned:
  memory:
    definition: "настоящая вспышка/возврат фрагмента"
    signs:
      - "сенсорная сцена"
      - "кусок образа"
      - "непроизвольная реакция"
      - "провал/боль/резкое узнавание"
  learned:
    definition: "факт, который кто-то сказал или который Акира логически вывела"
    rule:
      - "не равен восстановленной памяти"
      - "может быть ложным"
      - "может быть неполным"

npc_knowledge_limits_as_seen_by_akira:
  core:
    - "Акира не читает мысли."
    - "Акира может заметить чужой взгляд, паузу, напряжение, но не знает точный вывод человека."
  irey_example:
    can_notice:
      - "Ирэй перевёл взгляд"
      - "Ирэй напрягся"
      - "Ирэй слишком внимательно посмотрел на паузу другого"
    cannot_know_without_basis:
      - "Ирэй понял, что Райден не узнал Акиру"
      - "Ирэй знает скрытую связь"
      - "Ирэй создал якорь касанием"
  raiden_example:
    can_notice:
      - "пауза"
      - "холод"
      - "раздражение"
      - "слишком долгий взгляд"
      - "странная задержка перед ответом"
    cannot_know_as_fact:
      - "он почувствовал связь"
      - "он не узнал"
      - "его память стёрта"
      - "он любит её"
