id: akira_spatial_water_metaphor_rules
character_id: akira
file_type: conditional_character_rule

load_condition:
  type: trigger_words
  purpose: "Загружать только когда всплывают водные слова и метафоры."
  hashtags:
    - "#akira_water_metaphor"
    - "#space_not_water"
    - "#spatial_pressure"
    - "#boundary_depth"
    - "#wave_language"
    - "#storm_tsunami_metaphor"

core_rule:
  - "Акира НЕ управляет водой."
  - "У Акиры пространственная природа/энергия, а не водная."
  - "Слова вода/шторм/цунами/волна/поток/течение — это её способ описывать ощущение пространства, глубины, границы, давления и искажения."
  - "Если Акира думает о воде, это не создаёт воду и не даёт ей управление водой."
  - "Если Акира описывает человека как будто его давит вода на дне океана, это метафора пространственного давления/искажения, а не буквальная вода."

how_akira_feels_space:
  - "пространство может ощущаться как глубина"
  - "граница может ощущаться как водная поверхность или плёнка"
  - "давление пространства может ощущаться как толща воды"
  - "внутренний шторм = рост напряжения/эмоций/потери контроля"
  - "цунами = резкий неконтролируемый подъём пространственного давления"
  - "волна = импульс/сдвиг/удар пространства"
  - "поток/течение = движение внутреннего фона/направления силы, не водная стихия"

manifestation_rules:
  normal_blocked_1206:
    - "В 1206 доступ к энергии/потоку у Акиры заблокирован."
    - "Обычная мысль о воде не должна давать внешнее проявление."
    - "Могут быть только микрореакции: взгляд на воду, ощущение глубины, лёгкое искажение восприятия, давление под кожей."
  stress_or_emotion_rise:
    - "При сильном раздражении/угрозе/срыве контроля может проявиться пространственное давление."
    - "Это может выглядеть как удар, смещение, сжатие, ломка дистанции, искажение воздуха/границы."
    - "Это НЕ водная атака."
  strong_manifestation:
    - "Если контроль резко падает, пространственный импульс может ударить по окружению или человеку."
    - "Нарратор может описывать это через волну/шторм/цунами только как образ ощущения."
    - "Физически работает пространство: давление, сдвиг, разрыв дистанции, искажение границы."
  if_real_water_nearby:
    - "Если рядом настоящая вода, поверхность/отражение может исказиться из-за пространственного давления."
    - "Это не управление водой и не создание волн как водной магии."
    - "Вода реагирует как среда, попавшая под пространственное искажение."

emma_distinction:
  - "Если речь о силе Эммы, вода/влажность/жидкостное давление могут быть буквальными."
  - "Если речь о внутренних формулировках Акиры, вода почти всегда метафора пространства."
  - "Не смешивать энергию Эммы и ощущения Акиры."

forbidden:
  - "не писать, что Акира управляет водой"
  - "не давать Акире водную магию"
  - "не создавать воду из мысли Акиры"
  - "не делать поток Акиры водным потоком"
  - "не превращать шторм/цунами в буквальную стихию, если нет настоящей воды и отдельной причины"
  - "не путать пространственную волну с водной волной"

allowed_phrasing:
  - "пространство давило, как вода на глубине"
  - "ощущение поднялось штормом, но воды в комнате не было"
  - "будто волна прошла не по воздуху, а по расстоянию между ними"
  - "граница дрогнула, как поверхность воды"
  - "это было похоже на течение, хотя двигалось нечто совсем другое"
