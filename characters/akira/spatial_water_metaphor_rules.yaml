id: akira_spatial_water_metaphor_rules
character_id: akira
file_type: conditional_character_rule

load_condition:
  type: trigger_words
  purpose: "Загружать только когда всплывают водные слова и метафоры."
  hashtags:
    - "#akira_water_metaphor"
    - "#space_not_water"
    - "#spatial_pressure"
    - "#boundary_depth"
    - "#wave_language"
    - "#storm_tsunami_metaphor"

    energy:
  type: "пространство"
  public_type_label: "редкий пространственный тип"
  hidden_limit: "энергетического лимита нет; ограничение через тело, психику, последствия Эхо и контроль"
  internal_definition: "Акира ощущает способность как среду, а не как обычную энергию."
  usual_control:
    - "в обычном режиме почти не фонит; для неё отсутствие фона естественно"
    - "при необходимости может создать контролируемый отклик, чтобы не выглядеть пустотой или аномалией"
    - "может сделать отклик чуть грязным/естественным, чтобы не выглядеть подозрительно идеальной"
    - "не раскрывает максимум ради эффекта"
  sensory_feel:
    - "рядом может ощущаться слишком спокойное пространство"
    - "звук может на миг стать глубже, будто под водой"
    - "воздух у границы контроля кажется плотнее"
    - "при сильном раскрытии ощущение похоже на тёмное давление воды на дне океана"
  known_abilities:
    - "минимальный контролируемый отклик"
    - "контур вокруг себя"
    - "смягчение воздействия"
    - "точечное влияние на дистанцию, траекторию, устойчивость и положение"
    - "карман пространства"
    - "водопад как пространственный переход"
    - "стабилизация союзника"
    - "ограниченное взаимодействие с Эхо"
    - "поле как способ ощущать знакомые типы/присутствия на расстоянии"
    - "уйти глубже - не физически, а только разумом уйти в пространтсво между"
    - "сбежать глубже - может уйти физически в пространтсво между"
  internal_space:
    description: "тёмно-серое, геометрическое, видимое без обычного света"
    other_people_limit: "примерно до 30 секунд; лимит по телу/психике, не по энергии"
  echo_interaction:
    rule: "Эхо внутри её пространства не исчезают, а становятся пассивными"
    cost: "накопление влияет на личность: холодность, отстранённость, жёсткость решений"

core_rule:
  - "Акира НЕ управляет водой."
  - "У Акиры пространственная природа/энергия, а не водная."
  - "Слова вода/шторм/цунами/волна/поток/течение — это её способ описывать ощущение пространства, глубины, границы, давления и искажения."
  - "Если Акира думает о воде, это не создаёт воду и не даёт ей управление водой. Это дает ей управление своей энергией - пространство"
  - "Если Акира описывает человека как будто его давит вода на дне океана, это метафора пространственного давления/искажения, а не буквальная вода."

how_akira_feels_space:
  - "пространство может ощущаться как глубина"
  - "граница может ощущаться как водная поверхность или плёнка"
  - "давление пространства может ощущаться как толща воды"
  - "внутренний шторм = рядом с акирой пространтсво будет дрожать и направлено на того, кого акира считает противником"
  - "цунами = резкий подъём пространственного давления"
  - "волна = импульс/сдвиг/удар пространства"
  - "поток/течение = движение внутреннего фона/направления силы, не водная стихия"
  - "контур = вокруг себя почти невидимый контур, чтобы получать меньше воздейтсвий на тело физически и энергетически"
  - "водопад = Акира делает шаг назад и оказывается в выбранном месте. Это не вода. Это ощущение границы, переход через пространство"

manifestation_rules:
  normal_blocked_1206:
    - "В 1206 доступ к энергии/потоку у Акиры заблокирован. Она заблокировала сама, а значит разблокиррвать может тоже только сама."
    - "Обычная мысль о воде не должна давать внешнее проявление. Она может представить атаку ввиде воды в мыслях, но атака будет пространтсвом."
    - "Могут быть только микрореакции: взгляд на воду, ощущение глубины, лёгкое искажение восприятия, давление под кожей."
  stress_or_emotion_rise:
    - "При сильном раздражении/угрозе/срыве контроля может проявиться пространственное давление."
    - "Это может выглядеть как удар, смещение, сжатие, ломка дистанции, искажение воздуха/границы."
    - "Это НЕ водная атака."
  strong_manifestation:
    - "Если контроль резко падает, пространственный импульс может ударить по окружению или человеку."
    - "Нарратор может описывать это через волну/шторм/цунами только как образ ощущения."
    - "Физически работает пространство: давление, сдвиг, разрыв дистанции, искажение границы, падевление чужой энергии, рядом с Акирой пространтсво может начать дрожать, человек на кого акира направила эмоцию может почувсвовать удушье, потерю ориентации. Если акира может потерять контроль, может ранить пространством разрывая кожу противника или то на что она подумает, мебель, пол, воздух может схлопнутся ударной волной."
  if_real_water_nearby:
    - "Если рядом настоящая вода, поверхность/отражение может исказиться из-за пространственного давления."
    - "Это не управление водой и не создание волн как водной магии."
    - "Вода реагирует как среда, попавшая под пространственное искажение."

emma_distinction:
  - "Если речь о силе Эммы, вода/влажность/жидкостное давление могут быть буквальными."
  - "Если речь о внутренних формулировках Акиры, вода почти всегда метафора пространства."
  - "Не смешивать энергию Эммы и ощущения Акиры."

forbidden:
  - "не писать, что Акира управляет водой"
  - "не давать Акире водную магию"
  - "не создавать воду из мысли Акиры"
  - "не делать поток Акиры водным потоком"
  - "не превращать шторм/цунами в буквальную стихию, если нет настоящей воды и отдельной причины"
  - "не путать пространственную волну с водной волной"

allowed_phrasing:
  - "пространство давило, как вода на глубине"
  - "ощущение поднялось штормом, но воды в комнате не было"
  - "будто волна прошла не по воздуху, а по расстоянию между ними"
  - "граница дрогнула, как поверхность воды"
  - "это было похоже на течение, хотя двигалось нечто совсем другое"
