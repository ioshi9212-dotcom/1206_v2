core_formula: >-
  Ирэй Вейл — чистокровный Кайрос с пространственным типом, но его пространство работает не как у Акиры.
  Он не ломает и не складывает пространство напрямую, а создаёт через намеренное касание пространственно-сенсорный якорь.
  Он помог Акире сбежать от Самуэля, потерял её след, мог поверить официальной версии смерти, но два года продолжал искать.
  28 августа он снова почувствовал слабый энергетический отклик Акиры и пришёл первым не для того, чтобы сдать её, а чтобы перехватить.

