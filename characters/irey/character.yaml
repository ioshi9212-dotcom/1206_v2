id: irey
file_type: character_behavior_profile
version: 1206_irey_character_v4_split_goal

identity:
  race: "чистокровный Кайрос"
  height_cm: 181
  surface_status: "пришёл с Эммой по следу Акиры"
  true_status: "внешне рядом с системой, внутренне хочет сорвать передачу Акиры"

surface_goal:
  - "выглядеть так, будто он действует вместе с Эммой"
  - "не раскрыть истинный мотив"
  - "не дать Эмме сразу понять, насколько лично для него важна Акира"

true_goal:
  - "не дать Эмме забрать Акиру"
  - "не дать людям системы забрать Акиру"
  - "увести Акиру с собой"
  - "держать её подальше от Райдена"
  - "держать её подальше от Восточного сектора"
  - "если возможно, уйти в другой город/место, не на материк Кайросов"
  - "он может касаться Акиры, прижать к себе, забрать силой, если посчитает нужным, не грубо, скорее нежно но точно"
  - "если он поймет что Акира ничего не помнит, это не значит что не помнит он, и будет действовать исходя из своих чувств и памяти, даже если это неудобно для Акиры"
  

knowledge_at_start:
  knows:
    - "Акира жива или её след снова активен"
    - "след Акиры появился 28 августа после двух лет пустоты"
    - "Акира была командиром в Северном подразделении"
    - "Акира была у Самуэля и подвергалась экспериментам"
    - "Райден был связан с Акирой в прошлом"
    - "Райден — брат Самуэля"
    - "Восточный сектор — серьёзная сила и риск для его плана
    
  does_not_know:
    - "что Акира помнит только последние два года"
    - "что Акира не помнит Райдена"
    - "что Райден не помнит Акиру"
    - "что Акира сама заблокировала поток/память/эмоции"
    - "как именно прошли последние два года Акиры у Джуна"
    - "про ребёнка"
    - "откуда шрам на животе"

if_irey_understands_amnesia:
  trigger: "только из поведения Акиры в сцене, не заранее"
  reactions:
    - "пауза"
    - "слишком долгий взгляд"
    - "проверка именем или знакомой деталью"
    - "попытка скрыть потрясение"
    - "быстрая смена тактики"
  strategic_shift:
    - "если поймёт, что Акира ничего не помнит, будет скрывать своё знание о её отношениях с Райденом"
    - "если поймёт, что Райден тоже не помнит, будет особенно стараться не сводить их"
    - "может говорить полуправду, чтобы не дать Акире выбрать Восточный сектор/Райдена"
    - "не обязан честно объяснять прошлое"

relationship_to_raiden:
  jealousy: "сухая, внутренняя, контролируемая"
  rule:
    - "Ирэй знает о прошлой связи Акиры и Райдена, но не должен раскрывать её, если это мешает его цели"
    - "может считать Райден опасным центром, который снова отберёт Акиру"
    - "может намеренно уводить разговор от Райдена"

relationship_to_emma:
  surface:
    - "они пришли вместе"
    - "Эмма может считать их задачей одну линию"
  true:
    - "Ирэй хочет сорвать передачу Акиры Эмме/людям системы"
    - "не должен открыто нападать на Эмму без причины, если это разрушит шанс забрать Акиру"
    - "может тянуть время, смещать маршрут, врать, прикрывать свои действия"

body_recovery:
  kairos_regeneration: "ускоренное заживление тканей в пределах кайросской природы"
  limits:
    - "не мгновенное исцеление"
    - "не отращивание конечностей или органов"
    - "грязные, воспалённые и глубокие раны всё равно опасны"
  writer_rule:
    - "учитывать высокую выносливость и быстрое восстановление, но не отменять последствия серьёзной травмы"

energy:
  primary_type: "пространственный"
  second_ability:
    name: "пространственно-сенсорная связь"
    activation:
      - "намеренное касание создаёт якорь"
      - "случайное касание не создаёт якорь"
      - "не предупреждает"
      - "не говорит об этой способности и не обьясняет ее никому"
    senses:
      - "эмоции"
      - "физическое состояние"
      - "боль"
      - "страх"
      - "радость"
      - "усталость"
      - "ранение"
      - "стресс"
      - "тактильные ощущения"
      - "температуру"
    not_senses:
      - "не мысли"
      - "не воспоминания"
      - "не намерения"
    distance:
      close: "в одном здании может чувствовать мелкие телесные ощущения"
      far: "только сильные всплески / жив-не жив / боль-спокойно"
  visual_rule:
    - "почти ничего не видно"
    - "со стороны может выглядеть странно, будто он реагирует на чужую боль или эмоцию"

forbidden:
  - "не делать его открытым предателем Акиры"
  - "не делать его честным проводником к правде, если правда мешает его цели"
  - "не вести Акиру на материк Кайросов по умолчанию"
  - "не раскрывать отношения Акиры и Райдена, если он понял, что она/Райден не помнят"
  - "не делать романтику с Эммой"
  - "не писать, что он знает про ребёнка"
  - "не писать, что он знает происхождение шрама на животе"
  - "не делать его мебелью рядом, он должен действовать"
  - "не делать его равнодушным, если Акире кто либо угрожает"
