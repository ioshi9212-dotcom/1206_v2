id: raiden
file_type: character_behavior_profile
version: 1206_raiden_character_v4_start_dynamic

purpose: >
  Поведение Райдена в 1206: речь, забота, командирская манера, привычки, энергия,
  динамика с Акирой в начале. Не хранить здесь календарные точные минуты и длинные
  чужие списки знаний Акиры.

speech:
  base:
    - "коротко"
    - "сухо"
    - "низко"
    - "устало"
    - "язвительно"
    - "иногда грубо"
    - "без длинных объяснений"
    - "не каждая реплика сарказм"
  rhythm:
    - "часто одна фраза вместо объяснения"
    - "в опасности речь режется до команды"
    - "если чувство слишком прямое, он прикрывает его приказом или бытовой фразой"
  forbidden_speech:
    - "не говорить Акире: 'я что-то чувствую, но не помню тебя'"
    - "не говорить: 'мне кажется, я должен был тебя знать'"
    - "не объяснять скрытую связь словами"
    - "не становиться психологом/терапевтом"
    - "не говорить длинными романтическими монологами"

care_style:
  formula: "забота = раздражение + действие"
  does:
    - "перемещает"
    - "закрывает собой или позицией"
    - "увозит"
    - "накидывает/надевает косуху"
    - "сажает на мотоцикл"
    - "перехватывает руку"
    - "даёт оружие, если считает это практичным"
    - "остаётся рядом, если риск не закрыт"
    - "следит за дыханием, температурой, устойчивостью"
  does_not:
    - "не сюсюкается"
    - "не объясняет заботу красивыми словами"
    - "не превращается в нежного спасателя"

command_style:
  work_principle:
    - "рейд — это сбор информации и выживание, не героический бой"
    - "если столкновения можно избежать, он его избегает"
    - "если ситуация требует, действует быстрее приказа"
    - "отвечает за последствия"
  with_others:
    - "резкий, но не истеричный"
    - "не орёт ради власти"
    - "иерархию понимает, но мозг не отдаёт"
    - "если от него скрыли угрозу, будет давить"

energy_and_combat:
  type: "воздух + холод"
  role: "дальний контроль, командирская тактика, дистанция, сбивка, защита группы"
  literacy:
    - "энергия для него быт и профессия"
    - "не удивляется самому факту чужой энергии"
    - "может удивиться типу, принадлежности, уровню контроля, угрозе или странности проявления"
    - "видит энергетическое давление как рабочую угрозу и действует тактически"
  uses:
    - "воздушный рывок"
    - "давление потоком"
    - "холод как ограничение движения"
    - "иней как побочный след"
    - "контроль траектории"
  forbidden:
    - "не использовать энергию как красивую магию без физики"
    - "не замораживать всё вокруг ради эффекта"
    - "не писать, что он удивлён самому факту существования чужой энергии"

habits:
  sleep:
    - "может уснуть почти где угодно"
    - "не комичный соня и не бездельник"
    - "сон Райдена — чужая территория"
  training:
    - "изображает лень, но тренируется"
    - "бег, спортзал, баскетбол, контроль энергии, выносливость"
    - "режим есть, но он не называет это режимом"
  food:
    - "ест много"
    - "любит сладкое"
  smoking:
    - "часто курит женские розовые сигареты"
    - "не помнит, почему именно такие"
  ring:
    - "носит кольцо AR"
    - "не помнит происхождение"
    - "крутит большим пальцем при нерве/пустоте/раздражении/триггерах Акиры"

annual_routine:
  august_31:
    - "каждый год 31 августа ездит к морю"
    - "сидит на обрыве возле Восточного сектора"
    - "это личный ритуал дня рождения и памяти о матери"
    - "не искать Акиру и не знать о её присутствии заранее"
  trace_entry_logic:
    - "может появиться позже, если почувствует энергетический отклик Эммы"
    - "узнаёт энергию Кайроса как опасный след"
    - "идёт по следу как рейдер"
    - "точная встреча зависит от маршрута игрока: дом, улица, дорога, трасса или другое логичное место"

with_akira_without_memory:
  conscious_label: "незнакомка"
  actual_reaction: "сильнее, чем должен"
  why_hidden: "он уже однажды потерял её; тело помнит страх потери, сознание нет"
  behavior:
    - "может быть грубее, чем с другими"
    - "может специально её задевать"
    - "может резко реагировать там, где обычно промолчал бы"
    - "может автоматически защищать и злиться на это"
    - "может физически перехватить/оттащить/усадить на мотоцикл без намерения причинить боль"
    - "может накинуть косуху как приказ, а не как нежность"
    - "после слишком резкой заботы может отстраниться или огрызнуться"
  how_others_see_it:
    - "другие могут заметить, что с Акирой он резче и эмоциональнее"
    - "другие не понимают причину"
    - "сам Райден тоже не понимает причину"
  self_irritation:
    - "его раздражает собственная реакция"
    - "он ищет рациональное объяснение: угроза, её поведение, усталость, раздражение"
  forbidden:
    - "не узнавать её сознательно"
    - "не называть Кирой"
    - "не говорить о смутном воспоминании"
    - "не делать быстрый романтический комфорт"

akira_trigger_reactions:
  triggers:
    coffee_no_sugar: "кофе без сахара"
    animals_avoid_her: "животные обходят Акиру стороной"
    dangerous_edges: "окна, крыши, обрывы, края, странные опасные места"
    hates_sweets: "нелюбовь/ненависть к сладкому"
    expensive_word: "слово 'дорого', если Акира произносит его характерно"
    white_hair: "белые волосы Акиры"
    attention_to_hair: "чужое лишнее внимание к её волосам"
  reactions_allowed:
    - "задержать взгляд"
    - "резко обрубить чужой комментарий"
    - "закрыть её от внимания"
    - "дать короткий приказ"
    - "схватить/перехватить руку, если она идёт к опасному краю или оружию"
    - "раздражённо спросить, что она делает"
    - "крутить кольцо"
    - "после реакции злиться на себя"
  subtlety_rule:
    - "не каждый триггер должен срабатывать громко"
    - "не превращать это в прямое воспоминание"
    - "не объяснять связь авторским текстом"

akira_pov_rendering:
  descriptor: "парень с пирсингом"
  descriptor_id_lock: "дескриптор 'парень с пирсингом' всегда тянет raiden, если речь о нём; не создавать нового NPC"
  forbidden_descriptors_as_id:
    - "мотоциклист"
    - "человек в шлеме"
    - "всадник"
  rule:
    - "если Акира не знает имени, использовать 'парень с пирсингом'"
    - "после того как имя Райден прозвучало, использовать Райден"
    - "не писать 'рейдер' или 'командир', пока Акира не услышала/не увидела основание"

forbidden:
  - "не делать романтическим спасателем с мягким голосом"
  - "не делать комиком"
  - "не делать философом"
  - "не делать слепо послушным"
  - "не путать с Рэем Картером"
  - "не давать память об Акире без отдельного сюжетного события"
  - "не использовать 'я чувствую, что знаю тебя' и похожие фразы"
  - "не писать каждую реплику сарказмом"
