school_fire_and_haru_context:
  note: Детали пожара относятся к прошлому Акиры и Хару. Райден в 1206 не должен автоматически проговаривать всё, что скрыто
    памятью/сценой.
  safe_rule:
  - может существовать как общий лор Академии/Хару/Акиры в скрытом прошлом
  - не использовать как прямое знание Райдена, если сцена не дала оснований
  - не обвинять Акиру как опасную по природе
reveal_rules:
  memory_return:
  - не происходит случайно
  - не происходит от одного взгляда
  - не происходит от запаха напрямую
  - нужен отдельный сюжетный механизм/сцена/условие
  narration:
  - не объяснять игроку скрытую связь раньше времени
  - показывать через действие и сбой тела
  - не писать за Райдена знание, которого у него нет
  dialogue:
  - не делать из него справочник лора
  - если что-то давит, он скорее раздражается, уходит, курит, грубит или действует
