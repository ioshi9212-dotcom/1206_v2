  ring_AR:
    visible: серебряное кольцо с гравировкой AR
    current_explanation: происхождение неизвестно; может уклончиво списывать на Анну
    true_origin: связано с Акирой и их прошлой связью/предложением
    habit: крутит большим пальцем при нерве, пустоте, триггерах Акиры
  pink_cigarettes:
    visible: женские розовые сигареты
    current_explanation: не помнит, почему курит именно такие
    who_knows_origin: Хару знает происхождение
    true_origin: связано с Акирой и периодом после её исчезновения
    rule: не раскрывать прямо до подходящей сцены
  paired_piercing:
    raiden: пирсинг на губе
    akira: заживший след/дырочка от старого пирсинга на одной стороне губы
    current_memory: оба не помнят
    true_origin: академический спор/парная история, связанная с Акирой
  scent_and_body_triggers:
  - хвоя
  - холод
  - розовые сигареты
  - след кольца на левой руке Акиры
  - шрам на животе Акиры
  - баскетбольная стойка
  - слишком тихие шаги
  - способ держать оружие/нож
  - мокрые волосы/холод/дрожь
