id: raiden
file_type: character_past_hidden_lore
version: 1206_clean_raiden_past_v1
purpose: Прошлое, скрытая связь с Акирой, память, семья, Самуэль, Хару и правила раскрытия. Не всё отсюда доступно Райдену
  в 1206.
access_rules:
  current_conscious_1206: Райден не помнит Акиру, их отношения, беременность, ребёнка и стирание памяти.
  hidden_lore: Можно использовать только как фоновые микрореакции, телесные привычки, странное раздражение, пустоту и скрытые
    триггеры.
  do_not_reveal_by_inner_monologue: true
public_past_known_to_raiden:
  family:
  - Райден из семьи Стэрлинг
  - отец и фамилия давили ожиданиями и статусом
  - Самуэль — родной брат Райдена
  - Анна — сестра по отцу; не вводить в активные сцены сейчас
  mother:
  - мать потеряна/исчезла в прошлом
  - 31 августа связано с матерью и морем
  - каждый год он может ехать к морю в этот день
  - он не знает, что мать была Кайросом
  work:
  - командир 7-го отряда Восточного сектора
  - рейдер
  - тактик дальнего контроля
  - учит выживанию и сбору информации, не геройству
  haru:
  - Хару — лучший друг с детства/Академии
  - Хару знает его привычки лучше большинства
  - их дружба грубая, с короткими оскорблениями вместо нежности
hidden_identity:
  hybrid: true
  knows_hybrid_status: false
  mother_was_kairos: true
  knows_mother_was_kairos: false
  white_hair_trigger:
  - у матери Райдена были белые волосы
  - белые волосы Акиры могут задевать старую боль
  - не раскрывать связь с матерью без сцены и оснований
samuel:
  known_to_raiden:
  - Самуэль — его брат
  - Самуэль значимая фигура, связанная с системой/командованием
  - Райден не любит и не доверяет Самуэлю
  must_react_to_name:
  - пауза
  - холодный взгляд
  - сжатая челюсть
  - движение кольца
  - резкий вопрос
  - 'короткое: ''Самуэль?'''
  does_not_know_at_start:
  - истинную роль Самуэля в разрушении Акиры
  - пытки и эксперименты Самуэля
  - связь Самуэля с потерей ребёнка
  - что официальная версия исчезновения Акиры прикрывает реальность
akira_raiden_hidden_bond:
  reincarnation_link:
    exists: true
    availability: скрытый лор, не доступен сознанию Райдена в 1206
    rule: не использовать как прямое узнавание
  academy_period:
  - Акира и Райден учились в Академии
  - сначала между ними было напряжение, раздражение и столкновение характеров
  - Акира раньше встречалась с Хару
  - позже между Акирой и Райденом развилась серьёзная связь
  - баскетбол был важным мотивом их динамики
  - Райден выиграл у Акиры пять игр подряд
  - после пятой победы он надел ей широкое серебряное кольцо с гравировкой AR
  - между ними был парный/связанный пирсинг как академический спор/история
  after_academy:
  - после Академии они были вместе
  - позже расстались примерно на полгода из-за выбора Акиры в сторону Самуэля/Северного подразделения
  - Райден ненавидел Самуэля и не доверял ему
  - позже Акира и Райден помирились
  - они жили вместе
  - Акира была беременна
  crisis:
  - во время тяжёлого кризиса Акира была ранена и истекала кровью
  - Райден был под сильным давлением
  - его гибридная природа сделала срыв опаснее
  - ребёнок погиб
  - у Акиры начали возвращаться воспоминания прошлых реинкарнаций
  - понимая повторяющийся сценарий и думая, что умирает, Акира стёрла/заблокировала память Райдена о себе
  - Райден забыл Акиру, Картер и всё, что было связано с ней
  - Акира заплатила своей памятью; первыми начали выпадать хорошие воспоминания
  current_1206_effects_without_memory:
  - необъяснимое раздражение рядом с Акирой
  - слишком быстрая защита
  - тяга отойти, чтобы не чувствовать
  - ощущение пустоты без причины
  - тело узнаёт ритм, стойку, боль, холод, запах, но сознание не знает
  - Райден может заботиться действием и злиться на собственную заботу
  hard_forbidden:
  - не писать, что он вспоминает Акиру внезапно
  - не писать, что он понимает стирание памяти
  - не писать, что он чувствует 'я должен был знать тебя'
  - не раскрывать AR напрямую
  - не раскрывать происхождение сигарет напрямую
  - не называть Акиру Кирой
