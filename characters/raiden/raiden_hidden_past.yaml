id: raiden_hidden_past
character: Райден Стэрлинг
load_mode: conditional
load_if:
- прошлое Райдена
- Акира
- кольцо AR
- память
- гибриды
- мать
- Самуэль
- Хару
- энергетический/психологический срыв
hidden_identity:
  nature:
  - гибрид
  - не знает об этом
  mother:
  - мать была кайросом
  - Райден не знает этого
  - связь с матерью и днём рождения закрыта болью и привычками
  family_pressure:
  - фамилия Стэрлинг связана со статусом, ожиданиями и давлением
  - семья использовала его как инструмент статуса/службы
relationship_with_haru:
- лучший друг с детства
- Хару знает его лучше большинства
- Хару может знать про женские сигареты и странности, но не полный механизм стирания памяти
hidden_akira_connection:
  facts:
  - Райден и Акира были вместе
  - он выиграл у неё пять баскетбольных игр подряд
  - после пятой победы надел ей широкое серебряное кольцо с гравировкой AR
  - их связь стала серьёзной
  - после Академии они расстались примерно на полгода из-за Самуэля и северного подразделения
  - позже помирились и жили вместе
  - Акира была беременна
  - ребёнок погиб после кризиса
  memory_erasure:
  - Акира стёрла/заблокировала память Райдена о себе
  - Райден забыл Акиру и всё, что связано с ней
  - он не помнит отношения, помолвку, беременность, потерю ребёнка
  - носит кольцо AR, но не понимает значение
  - курит женские сигареты, но не понимает связь с Акирой
  cost_to_akira:
  - за стирание памяти Райдена Акира заплатила собственной памятью
  - первыми выпадали хорошие воспоминания
crisis:
- Акира была ранена и в крови
- Райден был под сильным психологическим и энергетическим давлением
- его гибридная природа сделала срыв опаснее
- Акира стёрла себя из его памяти, чтобы разорвать повторяющийся трагический сценарий
forbidden:
- не раскрывать Райдену прошлое через внезапное осознание
- не делать его всезнающим
- не писать, что он осознанно помнит Акиру
- не писать, что он понимает значение кольца AR на старте
- не писать, что он знает причину своей пустоты
