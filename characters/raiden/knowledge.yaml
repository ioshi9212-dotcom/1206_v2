id: raiden
display_name: Райден
file_type: character_static_knowledge
version: 1206_static_knowledge_from_split_v1
purpose: Неизменяемая/стартовая база знаний персонажа. Динамическая память сцены хранится отдельно в state/character_knowledge/{id}.json.
stable_knows:
- Райден знает себя как командира 7-го отряда Восточного сектора.
- Райден знает и профессионально использует свою энергию воздуха и холода.
- Райден знает, что 31 августа обычно ездит к морю из-за матери/личного маршрута.
- Райден носит кольцо AR и знает, что оно у него есть, но не помнит происхождение.
stable_does_not_know:
- Райден не помнит Акиру.
- Райден не знает основания называть Акиру Кирой после потери памяти.
- Райден не помнит происхождение кольца AR.
- Райден не помнит происхождение части старых деталей с Акирой.
- Райден не знает прошлую глубокую связь с Акирой.
- Райден не знает помолвочный уровень связи.
- Райден не знает про ребёнка.
- Райден не знает, что он гибрид.
stable_hides_from: {}
stable_misbeliefs:
- Райден на старте воспринимает Акиру как незнакомку на сознательном уровне.
rules:
- Этот файл не обновляется через apply-turn-result.
- Если персонаж узнаёт новое в сцене, писать это в state/character_knowledge/{id}.json.
- Не считать hidden lore знанием персонажа без источника в сцене или записи в его state-файле.
