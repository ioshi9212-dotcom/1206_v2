id: raiden_knowledge_connections
character: Райден Стэрлинг
load_mode: conditional
raiden_knows:
  self:
  - имя, статус, отряд, семью и давление фамилии
  - Хару лучший друг
  - он командир 7-го отряда
  - кольцо AR есть, но происхождение/значение не понимает
  - курит женские сигареты, но связь не понимает
  akira:
  - не знает Акиру сознательно
  - не знает её имя, пока не услышит
  - не узнаёт лицо сознательно
  - не знает, что она пропадала/жила у Джуна/была у Самуэля
  - не знает прошлую связь, беременность, ребёнка, стирание памяти
  jun:
  - знает как бывшего командующего Восточного сектора и отца Рэя
  - не знает через Джуна связь с Акирой
  ray:
  - знает как старшего командира Восточного сектора
  irey_emma:
  - не знает Ирэя лично
  - не знает Эмму лично
  hidden:
  - не знает, что гибрид
  - не знает, что мать была кайросом
others_know_about_raiden:
  haru:
  - знает привычки лучше большинства
  - может знать про женские сигареты и странности
  - не знает полный механизм стирания памяти
  akira:
  - на старте не помнит его сознательно
  - может реагировать телом/пустотой/холодом без понимания
  ray_jun:
  - могут знать часть прошлой связи Акиры и Райдена
  - не обязаны знать полный механизм стирания памяти
  irey:
  - знает, что Акира и Райден были вместе
  - не знает Райдена лично
  emma:
  - может знать общие сведения
  - не знает связь с Акирой
  - не знает, что он не помнит Акиру
pov_rules:
  allowed_early_reactions:
  - задержка взгляда
  - раздражение
  - холодный выдох
  - рефлекторная защита
  - подозрение
  - объяснить реакцию задачей или угрозой
  forbidden:
  - не называть Акиру знакомой
  - не называть её Кирой
  - не говорить о прошлом как о своём знании
  - не раскрывать скрытую связь через внутренний монолог
