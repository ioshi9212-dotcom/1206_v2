    - "может закрыть собой, закинуть на плечо и утащить"
  important_limit:
    - "резко не значит жестоко"
    - "сила не должна ломать/калечить Акиру без отдельной причины"
    - "он не осознаёт источник реакции и злится на себя из-за неё"
