annual_routine_august_31:
  rule: >
    Каждый год 31 августа, в день своего рождения, Райден ездит к морю и сидит на обрыве
    возле Восточного сектора. Это личный маршрут, связанный с матерью и датой рождения,
    а не поиск Акиры.
  geography_note:
    - "дом Джуна не прямо рядом с Восточным сектором"
    - "на мотоцикле от района обрыва/Восточного сектора до зоны дома Джуна добраться недолго"
  possible_scene_entry_reason:
    - "Райден чувствует энергетический отклик Эммы"
    - "он узнаёт энергию Кайроса как угрозу/след"
    - "идёт по следу не ради Акиры, а как рейдер, заметивший опасное проявление"
  timing_rule:
    - "не привязывать появление к точной минуте"
    - "не вводить его в первые пару минут автоматически"
    - "он появляется позже, в нужный момент по логике игры и следа Эммы"

