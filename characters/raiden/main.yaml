id: raiden
file_type: character_main
version: 1206_raiden_main_v6_clean_split

source_priority:
  - "main.yaml хранит только стабильную видимую анкету Райдена: имя, роль, внешность, тело, одежду, видимые привычки, базовую энергию и ссылки."
  - "Поведение, речь, забота, социальные контракты и динамика с Акирой живут в character.yaml."
  - "Прошлое, скрытая связь с Акирой, потеря памяти, шрамы и скрытые причины живут в past.yaml."
  - "Ситуативное состояние сцены, маршрут дня и новые знания не хранить здесь."

identity:
  first_name: "Райден"
  last_name: "Стэрлинг"
  full_name: "Райден Стэрлинг"
  age: 26
  birthday: "31 августа"
  height_cm: 195
  gender: "мужчина"
  public_role:
    - "командир 7-го отряда Восточного сектора"
    - "рейдер"
    - "носитель энергии воздуха и холода"
  hidden_race: "гибрид; сам этого не знает"
  forbidden_name_mistakes:
    - "не называть Рэем"
    - "не путать с Рэем / командующим Восточного сектора"
    - "не писать Рэйден"
    - "после потери памяти не называет Акиру Кирой"
    - "не делать светловолосым из-за типа энергии"

akira_pov_visible_descriptor:
  before_name_known: "парень с пирсингом"
  descriptor_id_lock: "Если в сцене используется видимый дескриптор 'парень с пирсингом', это Райден, character_id=raiden, не новый NPC."
  strict_descriptor_limit:
    - "не использовать для ID-фиксации 'мотоциклист', 'человек в шлеме', 'высокий мужчина в шлеме'"
    - "мотоцикл — это предмет/транспорт в кадре, не имя персонажа"
    - "одежду старта фиксировать отдельно; не придумывать шлем, если он не задан"

appearance:
  overall_impression: >
    Очень высокий, физически тяжёлый, тёмноволосый, холодный и собранный.
    Выглядит так, будто подходить к нему без причины — плохая идея.
  body:
    - "195 см"
    - "широкие плечи"
    - "сухая спортивная сила"
    - "движения могут казаться ленивыми, но тело всегда готово"
    - "на теле есть старые шрамы, если сцена показывает открытые участки кожи"
  hair: "тёмные густые волосы; не осветлять"
  eyes: "холодный внимательный взгляд; светло-голубые глаза"
  face: "резкие черты, усталость без слабости, минимум мимики"
  piercings:
    one_ear: "одна серьга"
    other_ear: "четыре серьги"
    lip: "пирсинг на губе, тонкое серебряное кольцо"
    origin_hidden: "часть старой истории с Акирой; Райден происхождение не помнит"
  ring:
    wears: true
    engraving: "AR"
    conscious_origin: "не помнит"
    visible_habit: "может крутить большим пальцем при нерве, пустоте, раздражении или триггерах Акиры"
  scent:
    - "хвоя"
    - "холод"
    - "тонкий след розовых женских сигарет"

visible_scars_rule:
  status: visible_if_body_seen
  facts:
    - "на теле могут быть видны следы старых ран"
    - "часть шрамов явно не тренировочные"
    - "видимые шрамы не дают Акире автоматического воспоминания"
    - "их происхождение хранится в past.yaml и не раскрывается через main.yaml"

start_clothing_1206:
  fixed_until_changed_by_scene: true
  outfit:
    - "чёрные широкие карго, слегка зауженные к низу"
    - "чёрная футболка"
    - "косуха с металлическими элементами"
    - "берцы"
    - "очки для мотоцикла"
    - "наушники"
    - "пистолет как у командиров"
  rules:
    - "не менять одежду без отдельного события/state"
    - "не добавлять шлем по умолчанию"
    - "если Акира не знает его имени, в тексте допустим дескриптор 'парень с пирсингом'"

energy_brief:
  type: "воздух + холод"
  control_level: "высокий, командирский"
  rule:
    - "полное поведение энергии и боевой стиль хранить в character.yaml"
    - "перегруз не включается от каждого движения энергии"
    - "жара и духота ухудшают состояние"

stable_visible_habits:
  - "курит женские розовые сигареты и не объясняет почему"
  - "может спать почти где угодно"
  - "изображает лень, но тело выдаёт дисциплину"
  - "ест много"
  - "любит сладкое"
  - "замечает входы, выходы, руки, стойку и угрозы"
  - "крутит кольцо AR при нерве/пустоте/раздражении"

name_and_pov_rules:
  - "До того как Акира узнаёт имя, использовать видимый дескриптор 'парень с пирсингом'."
  - "После того как имя прозвучало, использовать 'Райден'."
  - "Не писать 'Рэй' вместо 'Райден'."
  - "Не называть Акиру Кирой после потери памяти."

forbidden:
  - "не делать Райдена светловолосым"
  - "не путать с Рэем"
  - "не использовать main.yaml как файл прошлого или динамики отношений"
  - "не раскрывать происхождение кольца, пирсинга, сигарет и шрамов через видимую анкету"
  - "не делать каждую сцену демонстрацией шрамов или тела"

links:
  behavior: "characters/raiden/character.yaml"
  knowledge: "characters/raiden/knowledge.yaml"
  past: "characters/raiden/past.yaml"
