    Райден уже однажды потерял Акиру. Он этого не помнит, но тело и нервная система
    реагируют так, будто потеря может повториться. Поэтому рядом с ней он может быть
    грубее, резче и эмоциональнее, чем с другими.
  behavior_allowed:
    - "может резко приказать"
    - "может специально задевать/провоцировать её"
    - "может реагировать там, где обычно промолчал бы"
    - "может перехватить руку"
    - "может схватить за запястье/локоть без болезненного вреда"
