id: raiden
file_type: character_main
version: 1206_raiden_main_v4_clean_character_only

source_priority:
  - "Эта карточка описывает Райдена как персонажа: внешность, характер, привычки, энергию, стартовую динамику с Акирой."
  - "Не хранить здесь календарные точные минуты, чужие знания Акиры, длинные списки knows/does_not_know и технические правила сцены."
  - "Скрытая связь с Акирой используется только как фон микрореакций, не как сознательная память."

