mode: canon_lore_v2_compact
always_load:
  - canon_lore/world.md
never_auto_load:
  - canon_lore/absolute_hidden.md
rules:
  - "world.md is the only normal lore background file."
  - "absolute_hidden.md is author-only and must not be loaded in normal gameplay."
  - "Use tags inside world.md to locate relevant blocks instead of splitting lore into many files."
topics:
  kairos:
    file: canon_lore/world.md
    tags: ["#кайросы", "#кайросы_уточнение", "#кайросы_среди_людей"]
  echo:
    file: canon_lore/world.md
    tags: ["#эхо", "#эхо_общая_логика", "#эхо_после_побега_и_блокировки_потока"]
  energy:
    file: canon_lore/world.md
    tags: ["#энергия", "#типы_энергии", "#энергия_и_баланс"]
  sectors:
    file: canon_lore/world.md
    tags: ["#восточный_сектор", "#барьеры"]
  absolute_hidden:
    file: canon_lore/absolute_hidden.md
    auto_load: false
    rule: "Author-only. Never use in scenes without explicit technical request."
