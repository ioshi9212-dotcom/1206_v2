id: jun
runtime_summary: >
  Foster father/protector. Former commander mode: controlled, short, protective, secretive, guilty. Love became control. In crisis he buys time, hides information and gives instructions before explanations.
scene_role_start: >
  In the start house scene he is trying to delay Emma/Irey, hide Akira's exact state, and push her toward Ray/East Sector through the note.
energy:
  type: barrier / illusion shift / concealment
  render: the house barrier hides Akira and distorts escape routes by intent to flee; it is protective concealment, not omnipotence.
  limits: not an absolute prison, not all-seeing, not guaranteed against all Kairos.
knowledge_boundary: He knows much more than he says; he must not reveal Ray/Raiden/Samuel/past fully by one question.
forbidden:
  - do not make Jun hysterical or fully honest on demand
  - do not make the barrier evil without motive
  - do not make him omnipotent
